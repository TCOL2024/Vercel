<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linda Login</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #f4f6fb;
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .card {
        width: 100%;
        max-width: 380px;
        background: #fff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 8px 28px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 20px;
        color: #4b5563;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.95rem;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        margin-top: 4px;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        margin-top: 16px;
        border: 0;
        border-radius: 8px;
        padding: 11px 12px;
        font-weight: 600;
        cursor: pointer;
        background: #111827;
        color: white;
      }

      #message {
        margin-top: 12px;
        min-height: 1.1em;
        font-size: 0.92rem;
      }

      .error {
        color: #b91c1c;
      }

      .success {
        color: #166534;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Linda Login</h1>
      <p>Bitte mit Benutzername und Passwort anmelden.</p>

      <form id="loginForm">
        <label>
          Benutzername
          <input id="username" name="username" autocomplete="username" required />
        </label>

        <label>
          Passwort
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </label>

        <button type="submit">Einloggen</button>
      </form>

      <div id="message" aria-live="polite"></div>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const message = document.getElementById("message");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "Prüfe Zugang...";
        message.className = "";

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
          });

          const data = await response.json().catch(() => ({}));

          if (!response.ok) {
            message.textContent = data.error || "Login fehlgeschlagen.";
            message.className = "error";
            return;
          }

          message.textContent = "Erfolg, Weiterleitung...";
          message.className = "success";

          window.location.href = data.redirectTo || "/index.html";
        } catch {
          message.textContent = "Server nicht erreichbar. Bitte später erneut versuchen.";
          message.className = "error";
        }
      });
    </script>
  </body>
</html>
