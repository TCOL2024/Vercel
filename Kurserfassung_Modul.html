<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kurserfassung - Dozentenmodul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --shell: #354a5f;
      --shell-accent: #4b637a;
      --brand: #0a6ed1;
      --brand-dark: #0854a0;
      --brand-soft: #ebf3fb;
      --bg: #f5f6f7;
      --panel: #ffffff;
      --line: #e3e6e9;
      --line-strong: #cfd6dc;
      --text: #32363a;
      --muted: #6a6d70;
      --ok: #107e3e;
      --ok-soft: #e9f5ee;
      --warn: #b26a00;
      --danger: #bb0000;
      --focus: rgba(10, 110, 209, 0.22);
      --shadow: 0 6px 18px rgba(33, 40, 48, 0.08);
      --shadow-lift: 0 14px 30px rgba(20, 50, 90, 0.16);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: "72", "Source Sans 3", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }
    .shellbar {
      background: var(--shell);
      color: #fff;
      padding: 0 22px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(15, 25, 35, 0.25);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .shellbar .shell-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .shell-logo {
      width: 34px; height: 34px; border-radius: 9px;
      background: linear-gradient(145deg, #0a6ed1, #0854a0);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; letter-spacing: 0.4px;
      border: 1px solid rgba(255,255,255,0.3);
      flex: none;
    }
    .shell-title { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .shell-sub { font-size: 12px; color: rgba(255,255,255,0.72); }
    .shell-right { display: flex; align-items: center; gap: 8px; }
    .shell-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff; border-radius: 8px; padding: 7px 13px;
      font: inherit; font-size: 13.5px; font-weight: 600;
      text-decoration: none; cursor: pointer; white-space: nowrap;
    }
    .shell-btn:hover { background: rgba(255,255,255,0.2); }
    .shell-user {
      width: 34px; height: 34px; border-radius: 50%;
      background: #5b768e;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; flex: none;
      border: 1px solid rgba(255,255,255,0.35);
    }
    .stage { max-width: 1060px; margin: 0 auto; padding: 28px 22px 60px; }
    .screen { display: none; animation: fadeUp 0.28s ease; }
    .screen.active { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero { margin: 8px 0 26px; }
    .hero h1 { margin: 0 0 6px; font-size: 30px; font-weight: 700; letter-spacing: -0.2px; }
    .hero p { margin: 0; font-size: 16.5px; color: var(--muted); }
    .stat-strip { display: flex; gap: 10px; flex-wrap: wrap; margin: 0 0 26px; }
    .stat-chip {
      background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
      padding: 10px 16px; box-shadow: var(--shadow);
      display: flex; align-items: baseline; gap: 8px;
    }
    .stat-chip strong { font-size: 20px; color: var(--brand-dark); }
    .stat-chip span { font-size: 13px; color: var(--muted); font-weight: 600; }
    .action-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 16px;
    }
    .action-card {
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 24px 22px; cursor: pointer; text-align: left;
      box-shadow: var(--shadow); font: inherit; color: var(--text);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      display: flex; flex-direction: column; gap: 10px;
    }
    .action-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); border-color: var(--brand); }
    .action-icon {
      width: 48px; height: 48px; border-radius: 13px;
      background: var(--brand-soft); color: var(--brand-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 23px;
    }
    .action-card h3 { margin: 2px 0 0; font-size: 17.5px; }
    .action-card p { margin: 0; font-size: 14px; color: var(--muted); line-height: 1.45; }
    .action-card .go { margin-top: auto; color: var(--brand); font-weight: 700; font-size: 14px; }
    .wizard-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 8px; }
    .wizard-head .crumb { font-size: 13.5px; color: var(--muted); font-weight: 600; }
    .link-btn {
      background: none; border: none; color: var(--brand); font: inherit;
      font-size: 14px; font-weight: 700; cursor: pointer; padding: 6px 2px;
    }
    .link-btn:hover { text-decoration: underline; }
    .progress-track {
      height: 6px; border-radius: 99px; background: #e2e8ee; overflow: hidden; margin: 6px 0 30px;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--brand), #3b94e8);
      transition: width 0.3s ease; width: 10%;
    }
    .dialog-card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 20px;
      box-shadow: var(--shadow); padding: 38px 44px 32px;
      max-width: 720px; margin: 0 auto;
    }
    @media (max-width: 640px) { .dialog-card { padding: 26px 20px; } }
    .step-kicker { font-size: 13px; font-weight: 700; color: var(--brand); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .step-q { margin: 0 0 6px; font-size: 25px; font-weight: 700; letter-spacing: -0.2px; line-height: 1.25; }
    .step-help { margin: 0 0 24px; font-size: 15px; color: var(--muted); line-height: 1.5; }
    .big-input, .big-textarea, .big-select {
      width: 100%; font: inherit; font-size: 18px; color: var(--text);
      padding: 15px 17px; border: 2px solid var(--line-strong); border-radius: 13px;
      background: #fff; transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .big-input:focus, .big-textarea:focus, .big-select:focus {
      outline: none; border-color: var(--brand); box-shadow: 0 0 0 4px var(--focus);
    }
    .big-textarea { min-height: 120px; resize: vertical; line-height: 1.5; }
    .field-label { display: block; font-size: 13.5px; font-weight: 700; color: #44515e; margin: 18px 0 7px; }
    .field-label:first-of-type { margin-top: 0; }
    .field-label .opt { font-weight: 400; color: var(--muted); }
    .inline-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .inline-fields.thirds { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 560px) { .inline-fields, .inline-fields.thirds { grid-template-columns: 1fr; } }
    .choice-list { display: grid; gap: 12px; }
    .choice-list.cols { grid-template-columns: 1fr 1fr; }
    @media (max-width: 560px) { .choice-list.cols { grid-template-columns: 1fr; } }
    .choice-card {
      display: flex; align-items: center; gap: 14px;
      border: 2px solid var(--line-strong); border-radius: 14px;
      background: #fff; padding: 16px 18px; cursor: pointer;
      font: inherit; text-align: left; width: 100%;
      transition: border-color 0.13s ease, background 0.13s ease, transform 0.13s ease;
    }
    .choice-card:hover { border-color: var(--brand); transform: translateY(-1px); }
    .choice-card.selected {
      border-color: var(--brand); background: var(--brand-soft);
      box-shadow: 0 0 0 4px var(--focus);
    }
    .choice-radio {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--line-strong); flex: none; position: relative;
    }
    .choice-card.selected .choice-radio { border-color: var(--brand); }
    .choice-card.selected .choice-radio::after {
      content: ''; position: absolute; inset: 4px; border-radius: 50%; background: var(--brand);
    }
    .choice-icon {
      width: 42px; height: 42px; border-radius: 11px; flex: none;
      background: var(--brand-soft); color: var(--brand-dark);
      display: flex; align-items: center; justify-content: center; font-size: 19px; font-weight: 700;
    }
    .choice-copy { min-width: 0; }
    .choice-copy strong { display: block; font-size: 16.5px; }
    .choice-copy span { display: block; font-size: 13.5px; color: var(--muted); margin-top: 2px; }
    .wizard-nav {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; margin-top: 32px;
    }
    .btn {
      font: inherit; font-weight: 700; cursor: pointer; border-radius: 999px;
      padding: 14px 30px; font-size: 16px; border: 2px solid transparent;
      transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn.primary {
      background: var(--brand); color: #fff;
      box-shadow: 0 8px 18px rgba(10, 110, 209, 0.3);
    }
    .btn.primary:hover { background: var(--brand-dark); }
    .btn.secondary { background: #fff; color: var(--brand-dark); border-color: var(--line-strong); }
    .btn.secondary:hover { border-color: var(--brand); }
    .btn.small { padding: 9px 18px; font-size: 14px; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
    .step-error { color: var(--danger); font-size: 14px; font-weight: 700; margin-top: 14px; min-height: 18px; }
    .summary-list { border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
    .summary-row {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 14px;
      padding: 13px 18px; border-bottom: 1px solid var(--line); background: #fff;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-row .k { font-size: 13px; color: var(--muted); font-weight: 700; min-width: 130px; padding-top: 2px; }
    .summary-row .v { font-size: 15.5px; flex: 1; }
    .summary-row .edit { flex: none; }
    .success-card { text-align: center; padding: 54px 30px 44px; }
    .success-check {
      width: 84px; height: 84px; margin: 0 auto 20px; border-radius: 50%;
      background: var(--ok-soft); color: var(--ok);
      display: flex; align-items: center; justify-content: center;
    }
    .success-check svg { width: 44px; height: 44px; }
    .success-card h2 { margin: 0 0 8px; font-size: 26px; }
    .success-card p { margin: 0 0 28px; color: var(--muted); font-size: 16px; }
    .success-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .toolbar input, .toolbar select {
      font: inherit; font-size: 14.5px; padding: 10px 13px;
      border: 1.5px solid var(--line-strong); border-radius: 10px; background: #fff;
    }
    .toolbar input:focus, .toolbar select:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--focus); }
    .kurs-cards { display: grid; gap: 14px; }
    .kurs-card {
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 20px 24px;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }
    .kurs-card:hover { border-color: var(--brand); box-shadow: var(--shadow-lift); }
    .kurs-card-top { display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; flex-wrap: wrap; }
    .kurs-card h3 { margin: 0 0 3px; font-size: 18.5px; }
    .kurs-meta { font-size: 13.5px; color: var(--muted); }
    .kurs-meta b { color: #44515e; }
    .pill {
      display: inline-block; border-radius: 999px; padding: 4px 13px;
      font-size: 12.5px; font-weight: 700; white-space: nowrap;
    }
    .pill.geplant { background: #eef2f4; color: #44515e; }
    .pill.laufend { background: var(--brand-soft); color: var(--brand-dark); }
    .pill.gehalten, .pill.abgeschlossen { background: var(--ok-soft); color: var(--ok); }
    .pill.ausgefallen { background: #fdeaea; color: var(--danger); }
    .kurs-progress { margin: 14px 0 6px; }
    .kurs-progress .bar { height: 8px; border-radius: 99px; background: #e8edf2; overflow: hidden; }
    .kurs-progress .bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--brand), #3b94e8); border-radius: 99px; }
    .kurs-progress .lbl { font-size: 12.5px; color: var(--muted); margin-top: 5px; font-weight: 600; }
    .kurs-card-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .tage-list { margin-top: 16px; border-top: 1px solid var(--line); padding-top: 6px; }
    .tag-row {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 12px 4px; border-bottom: 1px solid var(--line);
    }
    .tag-row:last-child { border-bottom: none; }
    .tag-date {
      flex: none; width: 56px; text-align: center;
      background: var(--brand-soft); border-radius: 12px; padding: 8px 4px;
    }
    .tag-date b { display: block; font-size: 19px; color: var(--brand-dark); line-height: 1.1; }
    .tag-date span { font-size: 11.5px; color: var(--brand-dark); font-weight: 700; text-transform: uppercase; }
    .tag-body { flex: 1; min-width: 0; }
    .tag-body .t1 { font-size: 14.5px; font-weight: 700; }
    .tag-body .t2 { font-size: 14px; color: var(--text); margin-top: 2px; line-height: 1.45; }
    .tag-body .t3 { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
    .tag-side { flex: none; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .tag-actions { display: flex; gap: 4px; }
    .icon-btn {
      background: none; border: 1px solid var(--line-strong); border-radius: 8px;
      padding: 5px 10px; font: inherit; font-size: 12.5px; font-weight: 700;
      color: var(--brand-dark); cursor: pointer;
    }
    .icon-btn:hover { border-color: var(--brand); background: var(--brand-soft); }
    .icon-btn.del { color: var(--danger); }
    .empty-state {
      text-align: center; padding: 50px 20px; color: var(--muted);
      background: var(--panel); border: 1px dashed var(--line-strong); border-radius: var(--radius);
    }
    .empty-state .big { font-size: 38px; margin-bottom: 8px; }
    h2 { margin: 0 0 10px; font-size: 24px; }
    .overview-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .overview-head h2 { margin: 0; }
  </style>
</head>
<body>
  <header class="shellbar">
    <div class="shell-left">
      <div class="shell-logo">KE</div>
      <div>
        <div class="shell-title">Kurserfassung</div>
        <div class="shell-sub">Dozentenmodul &middot; noormann t&amp;c</div>
      </div>
    </div>
    <div class="shell-right">
      <button class="shell-btn" type="button" id="navHomeBtn">Start</button>
      <button class="shell-btn" type="button" id="navOverviewBtn">Meine Kurse</button>
      <a class="shell-btn" href="Dashboard.html">Dashboard</a>
      <div class="shell-user" id="userInitials">?</div>
    </div>
  </header>

  <main class="stage">

    <!-- HOME -->
    <section class="screen active" id="screenHome">
      <div class="hero">
        <h1 id="greeting">Guten Tag!</h1>
        <p>Was möchten Sie heute erledigen?</p>
      </div>
      <div class="stat-strip" id="statStrip"></div>
      <div class="action-grid">
        <button class="action-card" type="button" data-action="tag">
          <div class="action-icon">📅</div>
          <h3>Schulungstag dokumentieren</h3>
          <p>Unterricht gehalten? In drei Schritten festhalten, was Sie gemacht haben.</p>
          <span class="go">Los geht's →</span>
        </button>
        <button class="action-card" type="button" data-action="kurs">
          <div class="action-icon">➕</div>
          <h3>Neuen Kurs anlegen</h3>
          <p>Ein neuer Auftrag? Kurs mit Anbieter und Konditionen anlegen.</p>
          <span class="go">Kurs anlegen →</span>
        </button>
        <button class="action-card" type="button" data-action="tibros">
          <div class="action-icon">⇄</div>
          <h3>Termine aus tibros übernehmen</h3>
          <p>Einplanung aus dem tibros-Portal kopieren und automatisch einlesen.</p>
          <span class="go">Import starten →</span>
        </button>
        <button class="action-card" type="button" data-action="overview">
          <div class="action-icon">📊</div>
          <h3>Meine Kurse &amp; Auswertung</h3>
          <p>Alle Kurse, Schulungstage, UE-Stände und offene Honorare im Blick.</p>
          <span class="go">Zur Übersicht →</span>
        </button>
      </div>
    </section>

    <!-- KURS-WIZARD -->
    <section class="screen" id="screenKurs">
      <div class="wizard-head">
        <span class="crumb" id="kursCrumb">Neuer Kurs · Schritt 1 von 3</span>
        <button class="link-btn" type="button" data-cancel>Abbrechen</button>
      </div>
      <div class="progress-track"><div class="progress-fill" id="kursProgress"></div></div>
      <div class="dialog-card" id="kursStepHost"></div>
    </section>

    <!-- TAG-WIZARD -->
    <section class="screen" id="screenTag">
      <div class="wizard-head">
        <span class="crumb" id="tagCrumb">Schulungstag · Schritt 1 von 3</span>
        <button class="link-btn" type="button" data-cancel>Abbrechen</button>
      </div>
      <div class="progress-track"><div class="progress-fill" id="tagProgress"></div></div>
      <div class="dialog-card" id="tagStepHost"></div>
    </section>

    <!-- TIBROS-WIZARD -->
    <section class="screen" id="screenTibros">
      <div class="wizard-head">
        <span class="crumb" id="tibrosCrumb">Tibros-Import · Schritt 1 von 3</span>
        <button class="link-btn" type="button" data-cancel>Abbrechen</button>
      </div>
      <div class="progress-track"><div class="progress-fill" id="tibrosProgress"></div></div>
      <div class="dialog-card" id="tibrosStepHost"></div>
    </section>

    <!-- SUCCESS -->
    <section class="screen" id="screenSuccess">
      <div class="dialog-card success-card">
        <div class="success-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h2 id="successTitle">Gespeichert!</h2>
        <p id="successText">Ihre Eingaben wurden übernommen.</p>
        <div class="success-actions" id="successActions"></div>
      </div>
    </section>

    <!-- IMPORT -->
    <section class="screen" id="screenImport">
      <div class="wizard-head">
        <span class="crumb">JSON importieren</span>
        <button class="link-btn" type="button" data-cancel>Abbrechen</button>
      </div>
      <div class="dialog-card" id="importHost"></div>
    </section>

    <!-- OVERVIEW -->
    <section class="screen" id="screenOverview">
      <div class="overview-head">
        <h2>Meine Kurse</h2>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn secondary small" type="button" id="importBtn">📥 Importieren</button>
          <button class="btn secondary small" type="button" id="exportJsonBtn">Export JSON</button>
          <button class="btn secondary small" type="button" id="exportXlsBtn">Export XLS</button>
          <button class="btn primary small" type="button" id="overviewNewKursBtn">+ Neuer Kurs</button>
        </div>
      </div>
      <div class="stat-strip" id="overviewStats"></div>
      <div class="toolbar">
        <input type="text" id="kursSearch" placeholder="Suche Kurs, ID oder Anbieter …" style="flex:1; min-width:200px;" />
        <select id="kursFilterAnbieter"><option value="">Alle Anbieter</option></select>
        <select id="kursFilterStatus">
          <option value="">Alle Status</option>
          <option value="geplant">geplant</option>
          <option value="laufend">laufend</option>
          <option value="abgeschlossen">abgeschlossen</option>
          <option value="abgerechnet">abgerechnet</option>
        </select>
      </div>
      <div class="kurs-cards" id="kursCards"></div>
    </section>

  </main>

  <script src="shared_storage_client.js"></script>
  <script src="assets/mandanten_store.js"></script>
  <script>
    const KURS_STORAGE_KEY = 'tc_kurse_v1';
    const SESSION_KEY = 'rk_session_v1';

    let kurse = [];
    let tcMandanten = [];
    let currentSession = null;
    let expandedKursId = '';

    function storageRead(key, fallback) {
      let appRaw = null, localRaw = null;
      try { appRaw = window.appStorage && window.appStorage.getItem(key); } catch (_) {}
      try { localRaw = window.localStorage.getItem(key); } catch (_) {}
      const parse = (raw) => { try { const v = JSON.parse(raw); return v == null ? null : v; } catch (_) { return null; } };
      const a = appRaw != null ? parse(appRaw) : null;
      const l = localRaw != null ? parse(localRaw) : null;
      if (Array.isArray(a) && Array.isArray(l)) return l.length > a.length ? l : a;
      return a != null ? a : (l != null ? l : fallback);
    }
    function storageWrite(key, value) {
      const json = JSON.stringify(value);
      try { window.appStorage && window.appStorage.setItem(key, json); } catch (_) {}
      try { window.localStorage.setItem(key, json); } catch (_) {}
    }
    function nowIso() { return new Date().toISOString(); }
    function uid(prefix) { return prefix + '-' + Date.now() + '-' + Math.floor(Math.random() * 1000000); }
    function esc(v) { return String(v == null ? '' : v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function fmtDate(iso) { if (!iso || !/^\d{4}-\d{2}-\d{2}/.test(iso)) return iso || '-'; const [y,m,d] = iso.slice(0,10).split('-'); return d + '.' + m + '.' + y; }
    function num(v) { const n = Number(v); return Number.isFinite(n) ? n : 0; }
    function euro(v) { return num(v).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €'; }

    function requireAccess() {
      const raw = storageRead(SESSION_KEY, null);
      const session = raw && typeof raw === 'object' && raw.username ? raw : null;
      if (!session) {
        window.location.href = 'Benutzerverwaltung.html?next=Kurserfassung_Modul.html';
        return false;
      }
      currentSession = session;
      const initials = String(session.username || '?').slice(0, 2).toUpperCase();
      document.getElementById('userInitials').textContent = initials;
      const h = new Date().getHours();
      const gruss = h < 11 ? 'Guten Morgen' : (h < 18 ? 'Guten Tag' : 'Guten Abend');
      document.getElementById('greeting').textContent = gruss + ', ' + session.username + '!';
      return true;
    }
    function currentUser() { return currentSession ? String(currentSession.username) : 'unbekannt'; }

    function normalizeTyp(v) { return String(v || '').trim().toLowerCase().replace(/\s+/g, ' '); }
    function isTcMandantType(v) {
      const t = normalizeTyp(v);
      return t === 't&c kunde' || t === 'tc kunde' || t === 't&c' || t === 'rechnungstool';
    }
    function loadTcMandanten() {
      const list = (window.MandantenStore ? MandantenStore.loadMandanten() : []) || [];
      tcMandanten = list.filter(m => m && !m.isDeleted && isTcMandantType(m.mandantentyp));
    }
    function anbieterLabel(kurs) {
      if (!kurs) return '-';
      const m = window.MandantenStore ? MandantenStore.findMandantById(kurs.anbieterId) : null;
      if (m) return MandantenStore.displayName(m) || kurs.anbieterLabel || '-';
      return kurs.anbieterLabel || '-';
    }

    function normalizeTag(raw) {
      const r = raw && typeof raw === 'object' ? raw : {};
      return {
        id: String(r.id || '') || uid('tag'),
        datum: String(r.datum || '').slice(0, 10),
        von: String(r.von || '').slice(0, 5),
        bis: String(r.bis || '').slice(0, 5),
        ue: num(r.ue),
        thema: String(r.thema || '').trim(),
        material: String(r.material || '').trim(),
        bemerkung: String(r.bemerkung || '').trim(),
        status: ['geplant', 'gehalten', 'ausgefallen'].includes(String(r.status)) ? String(r.status) : 'geplant',
        abgerechnet: Boolean(r.abgerechnet),
        quelle: String(r.quelle || '').trim(),
        createdAt: String(r.createdAt || '') || nowIso(),
        createdBy: String(r.createdBy || '') || 'unbekannt'
      };
    }
    function normalizeKurs(raw) {
      const r = raw && typeof raw === 'object' ? raw : {};
      return {
        id: String(r.id || '') || uid('kurs'),
        kursId: String(r.kursId || '').trim(),
        name: String(r.name || '').trim(),
        anbieterId: String(r.anbieterId || '').trim(),
        anbieterLabel: String(r.anbieterLabel || '').trim(),
        von: String(r.von || '').slice(0, 10),
        bis: String(r.bis || '').slice(0, 10),
        format: ['Praesenz', 'Online', 'Hybrid'].includes(String(r.format)) ? String(r.format) : 'Praesenz',
        ort: String(r.ort || '').trim(),
        teilnehmer: Math.max(0, Math.round(num(r.teilnehmer))),
        ueGeplant: num(r.ueGeplant),
        honorarProUE: num(r.honorarProUE),
        notizen: String(r.notizen || '').trim(),
        status: ['geplant', 'laufend', 'abgeschlossen', 'abgerechnet'].includes(String(r.status)) ? String(r.status) : 'geplant',
        schulungstage: Array.isArray(r.schulungstage) ? r.schulungstage.map(normalizeTag) : [],
        createdAt: String(r.createdAt || '') || nowIso(),
        createdBy: String(r.createdBy || '') || 'unbekannt'
      };
    }
    function loadKurse() {
      const list = storageRead(KURS_STORAGE_KEY, []);
      kurse = (Array.isArray(list) ? list : []).map(normalizeKurs);
    }
    function saveKurse() { storageWrite(KURS_STORAGE_KEY, kurse); }
    function kursById(id) { return kurse.find(k => k.id === id) || null; }
    function sumUe(kurs, filterFn) {
      return kurs.schulungstage
        .filter(t => t.status !== 'ausgefallen')
        .filter(filterFn || (() => true))
        .reduce((s, t) => s + num(t.ue), 0);
    }
    function audit(eventType, payload) {
      try {
        if (window.MandantenStore && MandantenStore.appendCentralAudit) {
          MandantenStore.appendCentralAudit(eventType, payload || {}, currentUser(), nowIso());
        }
      } catch (_) {}
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function goHome() { renderHome(); showScreen('screenHome'); }
    function goOverview() { renderOverview(); showScreen('screenOverview'); }

    function showSuccess(title, text, actions) {
      document.getElementById('successTitle').textContent = title;
      document.getElementById('successText').textContent = text;
      const host = document.getElementById('successActions');
      host.innerHTML = '';
      actions.forEach((a, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn ' + (i === 0 ? 'primary' : 'secondary');
        btn.textContent = a.label;
        btn.addEventListener('click', a.onClick);
        host.appendChild(btn);
      });
      showScreen('screenSuccess');
    }

    function renderHome() {
      const month = nowIso().slice(0, 7);
      const today = nowIso().slice(0, 10);
      let ueMonat = 0, offenWert = 0, anstehend = 0;
      kurse.forEach(k => {
        const satz = num(k.honorarProUE);
        k.schulungstage.forEach(t => {
          if (t.status === 'ausgefallen') return;
          if (t.status === 'gehalten' && String(t.datum).startsWith(month)) ueMonat += num(t.ue);
          if (t.status === 'gehalten' && !t.abgerechnet) offenWert += num(t.ue) * satz;
          if (t.status === 'geplant' && t.datum >= today) anstehend += 1;
        });
      });
      const aktiv = kurse.filter(k => k.status === 'geplant' || k.status === 'laufend').length;
      document.getElementById('statStrip').innerHTML = ''
        + '<div class="stat-chip"><strong>' + aktiv + '</strong><span>aktive Kurse</span></div>'
        + '<div class="stat-chip"><strong>' + ueMonat + '</strong><span>UE diesen Monat</span></div>'
        + '<div class="stat-chip"><strong>' + anstehend + '</strong><span>anstehende Termine</span></div>'
        + '<div class="stat-chip"><strong>' + euro(offenWert) + '</strong><span>Honorar offen</span></div>';
    }

    const kursWizard = { step: 1, editId: '', data: {} };

    function blankKursData() {
      return { name: '', kursId: '', anbieterId: '', von: '', bis: '', format: 'Praesenz', ort: '', teilnehmer: '', ueGeplant: '', honorarProUE: '', notizen: '', status: 'geplant' };
    }

    function startKursWizard(editId) {
      loadTcMandanten();
      kursWizard.editId = editId || '';
      kursWizard.step = 1;
      if (editId) {
        const k = kursById(editId);
        kursWizard.data = k ? { name: k.name, kursId: k.kursId, anbieterId: k.anbieterId, von: k.von, bis: k.bis, format: k.format, ort: k.ort, teilnehmer: k.teilnehmer || '', ueGeplant: k.ueGeplant || '', honorarProUE: k.honorarProUE || '', notizen: k.notizen, status: k.status } : blankKursData();
      } else {
        kursWizard.data = blankKursData();
      }
      renderKursStep();
      showScreen('screenKurs');
    }

    function renderKursStep() {
      const total = 3;
      const s = kursWizard.step;
      const editing = Boolean(kursWizard.editId);
      document.getElementById('kursCrumb').textContent = (editing ? 'Kurs bearbeiten' : 'Neuer Kurs') + ' · Schritt ' + s + ' von ' + total;
      document.getElementById('kursProgress').style.width = (s / total * 100) + '%';
      const host = document.getElementById('kursStepHost');
      const d = kursWizard.data;

      let html = '';
      if (s === 1) {
        html = '<div class="step-kicker">Der Kurs</div><h2 class="step-q">Wie heißt der Kurs?</h2>'
          + '<p class="step-help">Name, Kurs-ID (z. B. tibros Veranstaltungs-Nr.) und Anbieter.</p>'
          + '<label class="field-label">Kursname</label><input class="big-input" id="wName" type="text" placeholder="z. B. Sozialrecht SGB II Grundlagen" value="' + esc(d.name) + '" autofocus />'
          + '<label class="field-label">Kurs-ID <span class="opt">(optional)</span></label><input class="big-input" id="wKursId" type="text" placeholder="z. B. 161-4711" value="' + esc(d.kursId) + '" />'
          + '<label class="field-label">Anbieter</label>'
          + (tcMandanten.length
            ? '<div class="choice-list">' + tcMandanten.map(m => {
                const sel = d.anbieterId === m.id ? ' selected' : '';
                const initials = (MandantenStore.displayName(m) || '?').split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
                return '<button type="button" class="choice-card' + sel + '" data-choice="' + esc(m.id) + '">'
                  + '<span class="choice-radio"></span><span class="choice-icon">' + esc(initials) + '</span>'
                  + '<span class="choice-copy"><strong>' + esc(MandantenStore.displayName(m) || '-') + '</strong>'
                  + '<span>' + esc((m.kundennummer ? 'Kundennr. ' + m.kundennummer : '') + (m.ort ? ' · ' + m.ort : '')) + '</span></span></button>';
              }).join('') + '</div>'
            : '<div style="padding:12px; background:#fdeaea; border-radius:10px; color:#bb0000; font-size:14px;">Noch kein Mandant vom Typ &bdquo;T&amp;C Kunde&ldquo; vorhanden. Bitte zuerst in der <a href="Mandantenverwaltung.html">Mandantenverwaltung</a> anlegen.</div>');
      } else if (s === 2) {
        html = '<div class="step-kicker">Rahmen &amp; Konditionen</div><h2 class="step-q">Wann und wie wird abgerechnet?</h2>'
          + '<p class="step-help">Alles optional – Sie können es später ergänzen.</p>'
          + '<div class="inline-fields">'
          + '<div><label class="field-label">Von</label><input class="big-input" id="wVon" type="date" value="' + esc(d.von) + '" /></div>'
          + '<div><label class="field-label">Bis</label><input class="big-input" id="wBis" type="date" value="' + esc(d.bis) + '" /></div>'
          + '</div>'
          + '<div class="inline-fields">'
          + '<div><label class="field-label">Format</label>'
          + '<div class="choice-list cols">'
          + ['Praesenz', 'Online', 'Hybrid'].map(f => '<button type="button" class="choice-card' + (d.format === f ? ' selected' : '') + '" data-format="' + f + '">'
            + '<span class="choice-radio"></span><span class="choice-copy"><strong>' + (f === 'Praesenz' ? 'Präsenz' : f) + '</strong></span></button>').join('')
          + '</div></div>'
          + '<div><label class="field-label">Ort / Raum</label><input class="big-input" id="wOrt" type="text" placeholder="z. B. Raum 2.04" value="' + esc(d.ort) + '" /></div>'
          + '</div>'
          + '<div class="inline-fields">'
          + '<div><label class="field-label">UE geplant</label><input class="big-input" id="wUeGeplant" type="number" min="0" step="1" placeholder="z. B. 64" value="' + esc(d.ueGeplant) + '" /></div>'
          + '<div><label class="field-label">Honorar pro UE (€)</label><input class="big-input" id="wHonorar" type="number" min="0" step="0.01" placeholder="z. B. 45,00" value="' + esc(d.honorarProUE) + '" /></div>'
          + '</div>'
          + '<label class="field-label">Notizen</label><textarea class="big-textarea" id="wNotizen" placeholder="Lehrplan, Ansprechpartner, Besonderheiten …">' + esc(d.notizen) + '</textarea>';
      } else {
        const anbieter = tcMandanten.find(m => m.id === d.anbieterId);
        const zeile = (k, v) => '<div class="summary-row"><span class="k">' + k + '</span><span class="v">' + v + '</span>'
          + '<span class="edit"><button class="link-btn" type="button" data-jump="1">Ändern</button></span></div>';
        html = '<div class="step-kicker">Zusammenfassung</div><h2 class="step-q">Passt alles?</h2>'
          + '<p class="step-help">Bitte prüfen Sie Ihre Angaben – mit einem Klick auf &bdquo;Ändern&ldquo; springen Sie zurück.</p>'
          + '<div class="summary-list">'
          + zeile('Kurs', '<b>' + esc(d.name) + '</b>' + (d.kursId ? ' · ' + esc(d.kursId) : ''))
          + zeile('Anbieter', esc(anbieter ? MandantenStore.displayName(anbieter) : '-'))
          + zeile('Zeitraum', (d.von || d.bis) ? (fmtDate(d.von) + ' – ' + fmtDate(d.bis)) : '<span style="color:var(--muted)">offen</span>')
          + zeile('Format / Ort', (d.format === 'Praesenz' ? 'Präsenz' : d.format) + (d.ort ? ' · ' + esc(d.ort) : ''))
          + zeile('Konditionen', (d.ueGeplant ? d.ueGeplant + ' UE geplant' : '<span style="color:var(--muted)">UE offen</span>')
            + (d.honorarProUE ? ' · ' + euro(d.honorarProUE) + ' / UE' : ''))
          + (d.notizen ? zeile('Notizen', esc(d.notizen)) : '')
          + '</div>';
      }

      html += '<div class="step-error" id="kursStepError"></div>'
        + '<div class="wizard-nav">'
        + (s > 1 ? '<button class="btn secondary" type="button" data-back>Zurück</button>' : '<span></span>')
        + '<button class="btn primary" type="button" data-next>'
        + (s === 3 ? (editing ? 'Änderungen speichern' : 'Kurs anlegen') : 'Weiter')
        + '</button></div>';

      host.innerHTML = html;
      wireKursStep();
      const first = host.querySelector('input, textarea');
      if (first && s !== 1) first.focus();
    }

    function collectKursStep() {
      const d = kursWizard.data;
      const g = (id) => { const el = document.getElementById(id); return el ? el.value : null; };
      if (kursWizard.step === 1) {
        d.name = (g('wName') || '').trim();
        d.kursId = (g('wKursId') || '').trim();
      } else if (kursWizard.step === 2) {
        d.von = g('wVon') || '';
        d.bis = g('wBis') || '';
        d.ort = (g('wOrt') || '').trim();
        d.ueGeplant = g('wUeGeplant') || '';
        d.honorarProUE = g('wHonorar') || '';
        d.notizen = (g('wNotizen') || '').trim();
      }
    }

    function wireKursStep() {
      const host = document.getElementById('kursStepHost');
      host.querySelectorAll('[data-choice]').forEach(btn => {
        btn.addEventListener('click', () => {
          kursWizard.data.anbieterId = btn.getAttribute('data-choice');
          host.querySelectorAll('[data-choice]').forEach(b => b.classList.toggle('selected', b === btn));
        });
      });
      host.querySelectorAll('[data-format]').forEach(btn => {
        btn.addEventListener('click', () => {
          kursWizard.data.format = btn.getAttribute('data-format');
          host.querySelectorAll('[data-format]').forEach(b => b.classList.toggle('selected', b === btn));
        });
      });
      host.querySelectorAll('[data-jump]').forEach(btn => {
        btn.addEventListener('click', () => { collectKursStep(); kursWizard.step = Number(btn.getAttribute('data-jump')); renderKursStep(); });
      });
      const back = host.querySelector('[data-back]');
      if (back) back.addEventListener('click', () => { collectKursStep(); kursWizard.step -= 1; renderKursStep(); });
      host.querySelector('[data-next]').addEventListener('click', onKursNext);
    }

    function onKursNext() {
      collectKursStep();
      const d = kursWizard.data;
      const err = document.getElementById('kursStepError');
      err.textContent = '';
      if (kursWizard.step === 1 && !d.name) { err.textContent = 'Bitte geben Sie einen Kursnamen an.'; return; }
      if (kursWizard.step === 1 && !d.anbieterId) {
        err.textContent = tcMandanten.length ? 'Bitte wählen Sie einen Anbieter aus.' : 'Bitte zuerst einen T&C-Kunden in der Mandantenverwaltung anlegen.';
        return;
      }
      if (kursWizard.step < 3) { kursWizard.step += 1; renderKursStep(); return; }
      saveKursFromWizard();
    }

    function saveKursFromWizard() {
      const d = kursWizard.data;
      const m = MandantenStore.findMandantById(d.anbieterId);
      const at = nowIso();
      const payload = {
        ...d,
        anbieterLabel: m ? (MandantenStore.displayName(m) || '') : '',
        updatedAt: at,
        updatedBy: currentUser()
      };
      let kursIdSaved = '';
      if (kursWizard.editId) {
        const idx = kurse.findIndex(k => k.id === kursWizard.editId);
        if (idx >= 0) {
          kurse[idx] = normalizeKurs({ ...kurse[idx], ...payload });
          kursIdSaved = kurse[idx].id;
          audit('kurs_updated', { id: kursIdSaved, name: d.name, kursId: d.kursId });
        }
      } else {
        const row = normalizeKurs({ ...payload, id: uid('kurs'), createdAt: at, createdBy: currentUser() });
        kurse.unshift(row);
        kursIdSaved = row.id;
        audit('kurs_created', { id: row.id, name: row.name, kursId: row.kursId, anbieter: row.anbieterLabel });
      }
      saveKurse();
      const editing = Boolean(kursWizard.editId);
      showSuccess(
        editing ? 'Kurs aktualisiert!' : 'Kurs angelegt!',
        '„' + d.name + '" ist gespeichert.' + (editing ? '' : ' Möchten Sie direkt den ersten Schulungstag dokumentieren?'),
        [
          { label: 'Schulungstag dokumentieren', onClick: () => startTagWizard(kursIdSaved) },
          { label: 'Termine aus tibros holen', onClick: () => startTibrosWizard(kursIdSaved) },
          { label: 'Zur Übersicht', onClick: () => { expandedKursId = kursIdSaved; goOverview(); } }
        ]
      );
    }

    const tagWizard = { step: 1, kursId: '', editTagId: '', data: {} };

    function blankTagData() {
      return { datum: nowIso().slice(0, 10), von: '', bis: '', ue: '', thema: '', material: '', bemerkung: '', status: 'gehalten', abgerechnet: false };
    }

    function startTagWizard(kursId, editTagId) {
      if (!kurse.length) {
        showSuccess('Noch kein Kurs vorhanden', 'Legen Sie zuerst einen Kurs an – danach können Sie Schulungstage dokumentieren.', [
          { label: 'Kurs anlegen', onClick: () => startKursWizard() },
          { label: 'Zur Startseite', onClick: goHome }
        ]);
        return;
      }
      tagWizard.kursId = kursId || '';
      tagWizard.editTagId = editTagId || '';
      tagWizard.step = tagWizard.kursId ? 2 : 1;
      if (editTagId && kursId) {
        const tag = (kursById(kursId) || { schulungstage: [] }).schulungstage.find(t => t.id === editTagId);
        tagWizard.data = tag ? { datum: tag.datum, von: tag.von, bis: tag.bis, ue: tag.ue || '', thema: tag.thema, material: tag.material, bemerkung: tag.bemerkung, status: tag.status, abgerechnet: tag.abgerechnet } : blankTagData();
      } else {
        tagWizard.data = blankTagData();
      }
      renderTagStep();
      showScreen('screenTag');
    }

    function renderTagStep() {
      const total = 3;
      const s = tagWizard.step;
      document.getElementById('tagCrumb').textContent = (tagWizard.editTagId ? 'Schulungstag bearbeiten' : 'Schulungstag') + ' · Schritt ' + s + ' von ' + total;
      document.getElementById('tagProgress').style.width = (s / total * 100) + '%';
      const host = document.getElementById('tagStepHost');
      const d = tagWizard.data;
      const kurs = kursById(tagWizard.kursId);

      let html = '';
      if (s === 1) {
        const cards = kurse
          .filter(k => k.status !== 'abgerechnet')
          .concat(kurse.filter(k => k.status === 'abgerechnet'))
          .map(k => {
            const sel = tagWizard.kursId === k.id ? ' selected' : '';
            return '<button type="button" class="choice-card' + sel + '" data-choice-kurs="' + esc(k.id) + '">'
              + '<span class="choice-radio"></span><span class="choice-icon">📚</span>'
              + '<span class="choice-copy"><strong>' + esc(k.name) + '</strong>'
              + '<span>' + esc(anbieterLabel(k)) + (k.kursId ? ' · ' + esc(k.kursId) : '') + ' · ' + k.schulungstage.length + ' Tage erfasst</span></span></button>';
          }).join('');
        html = '<div class="step-kicker">Der Kurs</div><h2 class="step-q">Um welchen Kurs geht es?</h2>'
          + '<p class="step-help">Wählen Sie den Kurs, für den Sie einen Schulungstag dokumentieren möchten.</p>'
          + '<div class="choice-list">' + cards + '</div>';
      } else if (s === 2) {
        html = '<div class="step-kicker">' + esc(kurs ? kurs.name : 'Schulungstag') + '</div>'
          + '<h2 class="step-q">Wann haben Sie unterrichtet?</h2>'
          + '<p class="step-help">Tragen Sie die Zeiten ein – die Unterrichtseinheiten (45 Min.) berechnen wir automatisch.</p>'
          + '<label class="field-label">Schulungstag</label><input class="big-input" id="wDatum" type="date" value="' + esc(d.datum) + '" />'
          + '<div class="inline-fields thirds">'
          + '<div><label class="field-label">Von</label><input class="big-input" id="wTagVon" type="time" value="' + esc(d.von) + '" /></div>'
          + '<div><label class="field-label">Bis</label><input class="big-input" id="wTagBis" type="time" value="' + esc(d.bis) + '" /></div>'
          + '<div><label class="field-label">UE</label><input class="big-input" id="wUe" type="number" min="0" step="0.5" placeholder="z. B. 8" value="' + esc(d.ue) + '" /></div>'
          + '</div>'
          + '<label class="field-label">Thema / Inhalte</label><textarea class="big-textarea" id="wThema" placeholder="Welche Themen haben Sie behandelt?" style="min-height:80px;">' + esc(d.thema) + '</textarea>'
          + '<label class="field-label">Material <span class="opt">(optional)</span></label><input class="big-input" id="wMaterial" type="text" placeholder="z. B. Folien, Skripte, Links" value="' + esc(d.material) + '" />'
          + '<label class="field-label">Bemerkungen <span class="opt">(optional)</span></label><textarea class="big-textarea" id="wBemerkung" placeholder="Sonstiges, das Sie festhalten möchten …" style="min-height:80px;">' + esc(d.bemerkung) + '</textarea>'
          + '<div class="hint-box" id="ueHint" style="display:none; margin-top:16px; background:var(--brand-soft); border:1px solid #c4dcf3; border-radius:12px; padding:13px 16px; font-size:14px; color:#1f4970; line-height:1.5;"></div>';
      } else {
        const satz = kurs ? num(kurs.honorarProUE) : 0;
        const honorar = satz && d.status === 'gehalten' ? ' · Honorar: <b>' + euro(num(d.ue) * satz) + '</b>' : '';
        const zeile = (k, v) => '<div class="summary-row"><span class="k">' + k + '</span><span class="v">' + v + '</span>'
          + '<span class="edit"><button class="link-btn" type="button" data-jump="2">Ändern</button></span></div>';
        html = '<div class="step-kicker">Fast geschafft</div><h2 class="step-q">Passt alles?</h2>'
          + '<p class="step-help">Ihre Dokumentation für diesen Schulungstag im Überblick.</p>'
          + '<div class="summary-list">'
          + zeile('Kurs', '<b>' + esc(kurs ? kurs.name : '-') + '</b><br><span style="color:var(--muted); font-size:13px;">' + esc(anbieterLabel(kurs)) + '</span>')
          + zeile('Wann', fmtDate(d.datum) + ((d.von || d.bis) ? ' · ' + esc(d.von || '?') + ' – ' + esc(d.bis || '?') + ' Uhr' : ''))
          + zeile('Umfang', '<b>' + num(d.ue) + ' UE</b>' + honorar)
          + zeile('Inhalt', esc(d.thema || '–')
            + (d.material ? '<br><span style="color:var(--muted); font-size:13px;">Material: ' + esc(d.material) + '</span>' : '')
            + (d.bemerkung ? '<br><span style="color:var(--muted); font-size:13px;">' + esc(d.bemerkung) + '</span>' : ''))
          + '</div>'
          + (d.status === 'gehalten'
            ? '<label class="field-label" style="margin-top:18px;"><input type="checkbox" id="wAbgerechnet"' + (d.abgerechnet ? ' checked' : '') + ' style="margin-right:8px; transform:scale(1.3);" />Dieser Tag ist bereits abgerechnet</label>'
            : '');
      }

      html += '<div class="step-error" id="tagStepError"></div>'
        + '<div class="wizard-nav">'
        + (s > (tagWizard.kursId && tagWizard.editTagId ? 2 : 1) ? '<button class="btn secondary" type="button" data-back>Zurück</button>' : '<span></span>')
        + '<button class="btn primary" type="button" data-next>'
        + (s === 3 ? 'Schulungstag speichern' : 'Weiter') + '</button></div>';

      host.innerHTML = html;
      wireTagStep();
    }

    function updateUeHint() {
      const von = document.getElementById('wTagVon');
      const bis = document.getElementById('wTagBis');
      const ue = document.getElementById('wUe');
      const hint = document.getElementById('ueHint');
      if (!von || !bis || !ue || !hint) return;
      if (von.value && bis.value) {
        const [h1, m1] = von.value.split(':').map(Number);
        const [h2, m2] = bis.value.split(':').map(Number);
        const minutes = (h2 * 60 + m2) - (h1 * 60 + m1);
        if (minutes > 0) {
          const auto = Math.round((minutes / 45) * 2) / 2;
          if (!ue.value) ue.value = auto;
          hint.style.display = 'block';
          hint.innerHTML = '💡 ' + von.value + ' bis ' + bis.value + ' Uhr sind <b>' + (minutes / 60).toLocaleString('de-DE') + ' Stunden</b> → wir haben <b>' + auto + ' UE</b> (à 45 Min.) vorgeschlagen.';
          return;
        }
      }
      hint.style.display = 'none';
    }

    function collectTagStep() {
      const d = tagWizard.data;
      const g = (id) => { const el = document.getElementById(id); return el ? el.value : null; };
      if (tagWizard.step === 1) {
        // bereits gesetzt
      } else if (tagWizard.step === 2) {
        d.datum = g('wDatum') || '';
        d.von = g('wTagVon') || '';
        d.bis = g('wTagBis') || '';
        d.ue = g('wUe') || '';
        d.thema = (g('wThema') || '').trim();
        d.material = (g('wMaterial') || '').trim();
        d.bemerkung = (g('wBemerkung') || '').trim();
      } else if (tagWizard.step === 3) {
        const cb = document.getElementById('wAbgerechnet');
        d.abgerechnet = cb ? cb.checked : false;
      }
    }

    function wireTagStep() {
      const host = document.getElementById('tagStepHost');
      host.querySelectorAll('[data-choice-kurs]').forEach(btn => {
        btn.addEventListener('click', () => {
          tagWizard.kursId = btn.getAttribute('data-choice-kurs');
          host.querySelectorAll('[data-choice-kurs]').forEach(b => b.classList.toggle('selected', b === btn));
        });
      });
      host.querySelectorAll('[data-jump]').forEach(btn => {
        btn.addEventListener('click', () => { collectTagStep(); tagWizard.step = Number(btn.getAttribute('data-jump')); renderTagStep(); });
      });
      const back = host.querySelector('[data-back]');
      if (back) back.addEventListener('click', () => { collectTagStep(); tagWizard.step -= 1; renderTagStep(); });
      host.querySelector('[data-next]').addEventListener('click', onTagNext);
      ['wTagVon', 'wTagBis'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', updateUeHint);
      });
      updateUeHint();
    }

    function onTagNext() {
      collectTagStep();
      const d = tagWizard.data;
      const err = document.getElementById('tagStepError');
      err.textContent = '';
      if (tagWizard.step === 1 && !tagWizard.kursId) { err.textContent = 'Bitte wählen Sie einen Kurs aus.'; return; }
      if (tagWizard.step === 2) {
        if (!d.datum) { err.textContent = 'Bitte geben Sie das Datum an.'; return; }
        if (!d.ue || num(d.ue) <= 0) { err.textContent = 'Bitte geben Sie die Unterrichtseinheiten an (oder Zeiten eintragen).'; return; }
        if (!d.thema) { err.textContent = 'Bitte geben Sie die Inhalte an.'; return; }
      }
      if (tagWizard.step < 3) { tagWizard.step += 1; renderTagStep(); return; }
      saveTagFromWizard();
    }

    function saveTagFromWizard() {
      const kurs = kursById(tagWizard.kursId);
      if (!kurs) return;
      const d = tagWizard.data;
      const at = nowIso();
      if (tagWizard.editTagId) {
        const idx = kurs.schulungstage.findIndex(t => t.id === tagWizard.editTagId);
        if (idx >= 0) {
          kurs.schulungstage[idx] = normalizeTag({ ...kurs.schulungstage[idx], ...d, updatedAt: at, updatedBy: currentUser() });
          audit('kurs_schulungstag_updated', { kursId: kurs.id, kurs: kurs.name, datum: d.datum });
        }
      } else {
        kurs.schulungstage.push(normalizeTag({ ...d, id: uid('tag'), createdAt: at, createdBy: currentUser() }));
        audit('kurs_schulungstag_added', { kursId: kurs.id, kurs: kurs.name, datum: d.datum, ue: num(d.ue) });
      }
      kurs.schulungstage.sort((a, b) => String(a.datum).localeCompare(String(b.datum)));
      kurs.updatedAt = at;
      kurs.updatedBy = currentUser();
      saveKurse();
      const kursId = kurs.id;
      showSuccess(
        'Schulungstag gespeichert!',
        fmtDate(d.datum) + ' · ' + num(d.ue) + ' UE für „' + kurs.name + '" sind dokumentiert.',
        [
          { label: 'Weiteren Tag dokumentieren', onClick: () => startTagWizard(kursId) },
          { label: 'Zur Übersicht', onClick: () => { expandedKursId = kursId; goOverview(); } },
          { label: 'Zur Startseite', onClick: goHome }
        ]
      );
    }

    const tibrosWizard = { step: 1, kursId: '', rows: [], pasteText: '' };

    function parseTibros(text) {
      const rows = [];
      const lines = String(text || '').split(/\r?\n/);
      const dateRe = /(\d{2})\.(\d{2})\.(\d{4})/;
      const timeRe = /(\d{1,2}[:.]\d{2})\s*(?:-|bis|–)\s*(\d{1,2}[:.]\d{2})/i;
      lines.forEach(line => {
        const raw = line.replace(/\t/g, '  ').trim();
        if (!raw) return;
        const dateMatch = raw.match(dateRe);
        if (!dateMatch) return;
        const datum = dateMatch[3] + '-' + dateMatch[2] + '-' + dateMatch[1];
        const timeMatch = raw.match(timeRe);
        const toTime = (s) => { const [h, m] = s.replace('.', ':').split(':'); return String(h).padStart(2, '0') + ':' + m; };
        const von = timeMatch ? toTime(timeMatch[1]) : '';
        const bis = timeMatch ? toTime(timeMatch[2]) : '';
        let rest = raw.replace(dateRe, ' ').replace(timeRe, ' ');
        let ue = 0;
        const ueMatch = rest.match(/(?:^|\s)(\d{1,2}(?:[.,]\d)?)(?:\s*(?:UE|UStd|Ustd))?(?=\s|$)/);
        if (ueMatch) {
          const candidate = Number(ueMatch[1].replace(',', '.'));
          if (candidate > 0 && candidate <= 16) { ue = candidate; rest = rest.replace(ueMatch[0], ' '); }
        }
        if (!ue && von && bis) {
          const [h1, m1] = von.split(':').map(Number);
          const [h2, m2] = bis.split(':').map(Number);
          const minutes = (h2 * 60 + m2) - (h1 * 60 + m1);
          if (minutes > 0) ue = Math.round((minutes / 45) * 2) / 2;
        }
        const thema = rest.replace(/\s{2,}/g, ' · ').replace(/^[\s·]+|[\s·]+$/g, '').trim();
        rows.push({ datum, von, bis, ue, thema, selected: true });
      });
      return rows;
    }

    function startTibrosWizard(kursId) {
      tibrosWizard.step = 1;
      tibrosWizard.kursId = kursId || '';
      tibrosWizard.rows = [];
      tibrosWizard.pasteText = '';
      renderTibrosStep();
      showScreen('screenTibros');
    }

    function renderTibrosStep() {
      const total = 3;
      const s = tibrosWizard.step;
      document.getElementById('tibrosCrumb').textContent = 'Tibros-Import · Schritt ' + s + ' von ' + total;
      document.getElementById('tibrosProgress').style.width = (s / total * 100) + '%';
      const host = document.getElementById('tibrosStepHost');

      let html = '';
      if (s === 1) {
        html = '<div class="step-kicker">Quelle</div><h2 class="step-q">Tibros-Daten einfügen</h2>'
          + '<p class="step-help">Kopieren Sie die Zeilen aus Ihrer tibros-Einplanung. Datum, Uhrzeit und UE werden automatisch erkannt.</p>'
          + '<textarea class="big-textarea" id="wPaste" style="min-height:200px; font-family:monospace;" placeholder="z. B.&#10;12.06.2026 10:00-13:00 8 Sozialrecht Grundlagen&#10;19.06.2026 10:00-13:00 8 Sozialrecht Vertiefung&#10;..."></textarea>'
          + '<button type="button" class="btn secondary small" style="margin-top:12px;" id="parseBtn">Termine aus Text erkennen</button>'
          + '<div id="parseResult"></div>';
      } else if (s === 2) {
        const rows = tibrosWizard.rows.filter(r => r.selected);
        const liste = rows.length
          ? '<div class="summary-list">' + rows.map(r => '<div class="summary-row">'
            + '<span class="k">' + fmtDate(r.datum) + '</span>'
            + '<span class="v">' + esc(r.von || '?') + '–' + esc(r.bis || '?') + ' · <b>' + num(r.ue) + ' UE</b>'
            + (r.thema ? '<br><span style="font-size:13px; color:var(--muted);">' + esc(r.thema) + '</span>' : '') + '</span></div>').join('') + '</div>'
          : '<div class="empty-state"><div class="big">📭</div>Keine Termine zum Import ausgewählt.</div>';
        html = '<div class="step-kicker">Zusammenfassung</div><h2 class="step-q">' + rows.length + ' Termine bereit</h2>'
          + '<p class="step-help">Diese Termine werden importiert und zu Schulungstagen hinzugefügt.</p>'
          + liste;
      }

      html += '<div class="step-error" id="tibrosStepError"></div>'
        + '<div class="wizard-nav">'
        + (s > 1 ? '<button class="btn secondary" type="button" data-back>Zurück</button>' : '<span></span>')
        + '<button class="btn primary" type="button" data-next>'
        + (s === 2 ? 'Termine importieren' : 'Weiter')
        + '</button></div>';

      host.innerHTML = html;
      wireTibrosStep();
    }

    function wireTibrosStep() {
      const host = document.getElementById('tibrosStepHost');
      const back = host.querySelector('[data-back]');
      if (back) back.addEventListener('click', () => { tibrosWizard.step -= 1; renderTibrosStep(); });
      const parseBtn = host.querySelector('#parseBtn');
      if (parseBtn) {
        parseBtn.addEventListener('click', () => {
          const text = document.getElementById('wPaste').value;
          tibrosWizard.rows = parseTibros(text);
          const result = document.getElementById('parseResult');
          if (tibrosWizard.rows.length) {
            result.innerHTML = '<div style="margin-top:14px; padding:12px; background:#ebf3fb; border-radius:10px; color:#0854a0; font-size:14px;">'
              + '✅ <b>' + tibrosWizard.rows.length + ' Termine erkannt</b> – weiter zum nächsten Schritt.</div>';
          } else {
            result.innerHTML = '<div style="margin-top:14px; padding:12px; background:#fdeaea; border-radius:10px; color:#bb0000; font-size:14px;">'
              + '❌ Keine Termine gefunden. Prüfen Sie das Datumsformat (z. B. 12.06.2026).</div>';
          }
        });
      }
      host.querySelector('[data-next]').addEventListener('click', onTibrosNext);
    }

    function onTibrosNext() {
      const err = document.getElementById('tibrosStepError');
      err.textContent = '';
      if (tibrosWizard.step === 1) {
        if (!tibrosWizard.rows.length) { err.textContent = 'Bitte erkennen Sie zuerst Termine aus dem Text.'; return; }
        tibrosWizard.step = 2;
      } else if (tibrosWizard.step === 2) {
        saveTibrosImport();
        return;
      }
      renderTibrosStep();
    }

    function saveTibrosImport() {
      const kurs = kursById(tibrosWizard.kursId);
      if (!kurs) { goHome(); return; }
      const rows = tibrosWizard.rows.filter(r => r.selected);
      const at = nowIso();
      rows.forEach(r => {
        kurs.schulungstage.push(normalizeTag({
          id: uid('tag'),
          datum: r.datum,
          von: r.von,
          bis: r.bis,
          ue: r.ue,
          thema: r.thema,
          quelle: 'tibros',
          createdAt: at,
          createdBy: currentUser()
        }));
      });
      kurs.schulungstage.sort((a, b) => String(a.datum).localeCompare(String(b.datum)));
      kurs.updatedAt = at;
      kurs.updatedBy = currentUser();
      saveKurse();
      audit('kurs_tibros_import', { kursId: kurs.id, count: rows.length });
      showSuccess(
        rows.length + ' Termine importiert!',
        rows.length + ' Schulungstage wurden zu „' + kurs.name + '" hinzugefügt.',
        [
          { label: 'Weitere Termine importieren', onClick: () => startTibrosWizard(kurs.id) },
          { label: 'Zur Übersicht', onClick: () => { expandedKursId = kurs.id; goOverview(); } },
          { label: 'Zur Startseite', onClick: goHome }
        ]
      );
    }

    function renderOverview() {
      const month = nowIso().slice(0, 7);
      let ueMonat = 0, offenWert = 0, abgerechnet = 0;
      kurse.forEach(k => {
        const satz = num(k.honorarProUE);
        k.schulungstage.forEach(t => {
          if (t.status === 'ausgefallen') return;
          if (t.status === 'gehalten' && String(t.datum).startsWith(month)) ueMonat += num(t.ue);
          if (t.status === 'gehalten' && !t.abgerechnet) offenWert += num(t.ue) * satz;
          if (t.status === 'gehalten' && t.abgerechnet) abgerechnet += 1;
        });
      });
      document.getElementById('overviewStats').innerHTML = ''
        + '<div class="stat-chip"><strong>' + kurse.length + '</strong><span>Kurse gesamt</span></div>'
        + '<div class="stat-chip"><strong>' + ueMonat + '</strong><span>UE diesen Monat</span></div>'
        + '<div class="stat-chip"><strong>' + euro(offenWert) + '</strong><span>Honorar offen</span></div>'
        + '<div class="stat-chip"><strong>' + abgerechnet + '</strong><span>Tage abgerechnet</span></div>';

      const q = (document.getElementById('kursSearch').value || '').toLowerCase();
      const qAnbieter = (document.getElementById('kursFilterAnbieter').value || '').toLowerCase();
      const qStatus = (document.getElementById('kursFilterStatus').value || '');

      const filtered = kurse.filter(k => {
        const qMatch = !q || k.name.toLowerCase().includes(q) || (k.kursId || '').toLowerCase().includes(q) || anbieterLabel(k).toLowerCase().includes(q);
        const aMatch = !qAnbieter || (k.anbieterId || '').toLowerCase() === qAnbieter;
        const sMatch = !qStatus || k.status === qStatus;
        return qMatch && aMatch && sMatch;
      });

      const anbieters = [...new Set(kurse.map(k => k.anbieterId).filter(Boolean))];
      const sel = document.getElementById('kursFilterAnbieter');
      sel.querySelectorAll('option:not(:first-child)').forEach(o => o.remove());
      anbieters.forEach(id => {
        const m = window.MandantenStore ? MandantenStore.findMandantById(id) : null;
        const opt = document.createElement('option');
        opt.value = id.toLowerCase();
        opt.textContent = m ? MandantenStore.displayName(m) : id;
        sel.appendChild(opt);
      });

      const host = document.getElementById('kursCards');
      if (!filtered.length) {
        host.innerHTML = '<div class="empty-state"><div class="big">📭</div>Keine Kurse gefunden. <button class="link-btn" type="button" id="newKursFromEmpty">Neuen Kurs anlegen</button></div>';
        document.getElementById('newKursFromEmpty').addEventListener('click', () => startKursWizard());
        return;
      }

      host.innerHTML = filtered.map(k => {
        const ueSumme = sumUe(k);
        const ueProgress = k.ueGeplant ? Math.round(ueSumme / k.ueGeplant * 100) : 0;
        const satz = num(k.honorarProUE);
        const honorarOffen = k.schulungstage
          .filter(t => t.status === 'gehalten' && !t.abgerechnet)
          .reduce((s, t) => s + (num(t.ue) * satz), 0);
        const isExpanded = expandedKursId === k.id;
        const tags = k.schulungstage
          .filter(t => t.status !== 'ausgefallen')
          .sort((a, b) => String(b.datum).localeCompare(String(a.datum)))
          .slice(0, isExpanded ? 100 : 3);
        const hiddenCount = k.schulungstage.filter(t => t.status !== 'ausgefallen').length - tags.length;

        return '<div class="kurs-card">'
          + '<div class="kurs-card-top">'
          + '<div><h3>' + esc(k.name) + '</h3>'
          + '<div class="kurs-meta"><b>' + esc(anbieterLabel(k)) + '</b>' + (k.kursId ? ' · ID: ' + esc(k.kursId) : '') + '</div>'
          + '</div>'
          + '<span class="pill ' + esc(k.status) + '">' + esc(k.status) + '</span>'
          + '</div>'
          + (k.ueGeplant ? '<div class="kurs-progress">'
            + '<div class="bar"><i style="width:' + ueProgress + '%"></i></div>'
            + '<div class="lbl">' + ueSumme + ' / ' + k.ueGeplant + ' UE (' + ueProgress + '%)</div>'
            + '</div>' : '')
          + (honorarOffen > 0 ? '<div style="font-size:14px; margin:10px 0; color:var(--brand-dark);"><b>Honorar offen: ' + euro(honorarOffen) + '</b></div>' : '')
          + (tags.length ? '<div class="tage-list">' + tags.map(t => {
              const satz = num(k.honorarProUE);
              const honorar = satz && t.status === 'gehalten' ? ' · ' + euro(num(t.ue) * satz) : '';
              return '<div class="tag-row">'
                + '<div class="tag-date"><b>' + fmtDate(t.datum).split('.')[0] + '.</b><span>' + fmtDate(t.datum).split('.')[1] + '.</span></div>'
                + '<div class="tag-body">'
                + '<div class="t1">' + num(t.ue) + ' UE<span style="color:var(--muted); font-weight:400;">  · ' + (t.von || '?') + '–' + (t.bis || '?') + ' Uhr</span></div>'
                + '<div class="t2">' + esc(t.thema || '–') + '</div>'
                + '<div class="t3"><span class="pill ' + esc(t.status) + '" style="font-size:11px;">' + esc(t.status) + '</span>' + (t.abgerechnet ? ' · abgerechnet' : '') + honorar + '</div>'
                + '</div>'
                + '<div class="tag-side"><div class="tag-actions">'
                + '<button type="button" class="icon-btn" data-edit-tag="' + esc(t.id) + '" data-edit-kurs="' + esc(k.id) + '">✎</button>'
                + '<button type="button" class="icon-btn del" data-del-tag="' + esc(t.id) + '" data-del-kurs="' + esc(k.id) + '">✕</button>'
                + '</div></div>'
                + '</div>';
            }).join('') + '</div>' : '')
          + (hiddenCount > 0 ? '<div style="font-size:13px; color:var(--muted); margin-top:10px; padding:8px; background:var(--brand-soft); border-radius:8px;">+ ' + hiddenCount + ' weitere Tage</div>' : '')
          + '<div class="kurs-card-actions">'
          + '<button class="btn secondary small" type="button" data-add-tag="' + esc(k.id) + '">+ Tag hinzufügen</button>'
          + '<button class="btn secondary small" type="button" data-edit-kurs-main="' + esc(k.id) + '">Kurs bearbeiten</button>'
          + '<button class="btn secondary small" type="button" data-del-kurs="' + esc(k.id) + '">Löschen</button>'
          + '</div>'
          + '</div>';
      }).join('');

      host.querySelectorAll('[data-add-tag]').forEach(btn => {
        btn.addEventListener('click', () => startTagWizard(btn.getAttribute('data-add-tag')));
      });
      host.querySelectorAll('[data-edit-tag]').forEach(btn => {
        btn.addEventListener('click', () => startTagWizard(btn.getAttribute('data-edit-kurs'), btn.getAttribute('data-edit-tag')));
      });
      host.querySelectorAll('[data-del-tag]').forEach(btn => {
        btn.addEventListener('click', () => {
          const kursId = btn.getAttribute('data-del-kurs');
          const tagId = btn.getAttribute('data-del-tag');
          const k = kursById(kursId);
          if (!k || !confirm('Schulungstag wirklich löschen?')) return;
          k.schulungstage = k.schulungstage.filter(t => t.id !== tagId);
          saveKurse();
          renderOverview();
        });
      });
      host.querySelectorAll('[data-edit-kurs-main]').forEach(btn => {
        btn.addEventListener('click', () => startKursWizard(btn.getAttribute('data-edit-kurs-main')));
      });
      host.querySelectorAll('[data-del-kurs]').forEach(btn => {
        btn.addEventListener('click', () => {
          const kursId = btn.getAttribute('data-del-kurs');
          const k = kursById(kursId);
          if (!k || !confirm('Kurs „' + k.name + '" wirklich löschen?')) return;
          kurse = kurse.filter(kk => kk.id !== kursId);
          saveKurse();
          expandedKursId = '';
          renderOverview();
        });
      });
    }

    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.getAttribute('data-action');
        if (action === 'kurs') startKursWizard();
        else if (action === 'tag') startTagWizard();
        else if (action === 'tibros') startTibrosWizard();
        else if (action === 'overview') goOverview();
      });
    });
    document.getElementById('navHomeBtn').addEventListener('click', goHome);
    document.getElementById('navOverviewBtn').addEventListener('click', goOverview);
    document.getElementById('overviewNewKursBtn').addEventListener('click', () => startKursWizard());
    ['kursSearch', 'kursFilterAnbieter', 'kursFilterStatus'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('change', renderOverview);
      if (el) el.addEventListener('input', renderOverview);
    });
    document.getElementById('exportJsonBtn').addEventListener('click', () => {
      const data = JSON.stringify(kurse, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'kurse_' + nowIso().slice(0, 10) + '.json';
      a.click();
    });
    document.getElementById('exportXlsBtn').addEventListener('click', () => {
      let rows = 'Kurs\tKurs-ID\tAnbieter\tDatum\tVon\tBis\tUE\tStatus\tThema\tHonorar\n';
      const satz = {};
      kurse.forEach(k => { satz[k.id] = num(k.honorarProUE); });
      kurse.forEach(k => {
        k.schulungstage.forEach(t => {
          const h = (satz[k.id] || 0) * num(t.ue);
          rows += [k.name, k.kursId, anbieterLabel(k), t.datum, t.von, t.bis, t.ue, t.status, t.thema, (h > 0 ? h : '')].map(v => String(v).replace(/"/g, '""')).join('\t') + '\n';
        });
      });
      const blob = new Blob([rows], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'kurse_' + nowIso().slice(0, 10) + '.tsv';
      a.click();
    });
    document.querySelectorAll('[data-cancel]').forEach(btn => {
      btn.addEventListener('click', goHome);
    });

    // IMPORT
    let importedData = null;
    let importDuplicate = null;

    function findDuplicate(data) {
      const k = kursById(data.kursId);
      if (!k) return null;
      return k.schulungstage.find(t =>
        t.datum === data.datum &&
        num(t.ue) === num(data.ue) &&
        t.thema === data.themen
      );
    }

    function renderImportScreen() {
      const host = document.getElementById('importHost');
      let html = '<div class="step-kicker">JSON-Datei</div>'
        + '<h2 class="step-q">Quick-Log JSON importieren</h2>'
        + '<p class="step-help">Laden Sie die JSON-Datei vom Smartphone hoch oder kopieren Sie den Inhalt.</p>'
        + '<div style="margin:20px 0;">'
        + '<label class="field-label">JSON-Datei oder Text</label>'
        + '<textarea id="importJson" class="big-textarea" style="min-height:150px; font-family:monospace;" placeholder="{...}"></textarea>'
        + '</div>'
        + '<div id="importError" class="step-error"></div>'
        + '<div class="wizard-nav">'
        + '<button class="btn secondary" type="button" id="importCancelBtn">Abbrechen</button>'
        + '<button class="btn primary" type="button" id="importParseBtn">Laden</button>'
        + '</div>';
      host.innerHTML = html;

      document.getElementById('importParseBtn').addEventListener('click', onImportParse);
      document.getElementById('importCancelBtn').addEventListener('click', () => goOverview());
    }

    function onImportParse() {
      const json = document.getElementById('importJson').value;
      const err = document.getElementById('importError');
      err.textContent = '';

      let data;
      try {
        data = JSON.parse(json);
      } catch (e) {
        err.textContent = 'Ungültiges JSON-Format: ' + e.message;
        return;
      }

      if (!data.datum || !data.kursId || !data.ue || !data.themen) {
        err.textContent = 'Erforderliche Felder fehlen: datum, kursId, ue, themen';
        return;
      }

      const kurs = kursById(data.kursId);
      if (!kurs) {
        err.textContent = 'Kurs nicht gefunden (ID: ' + data.kursId + ')';
        return;
      }

      importedData = data;
      importDuplicate = findDuplicate(data);
      showImportReview();
    }

    function showImportReview() {
      const host = document.getElementById('importHost');
      const data = importedData;
      const dup = importDuplicate;
      const kurs = kursById(data.kursId);
      const satz = num(kurs.honorarProUE);
      const honorar = satz ? num(data.ue) * satz : 0;

      let html = '<div class="step-kicker">Bestätigung</div>';

      if (dup) {
        html += '<h2 class="step-q">⚠️ Schulungstag existiert bereits</h2>'
          + '<p class="step-help">Dieser Eintrag (Kurs, Datum, UE, Thema) existiert schon. Sie können ihn überschreiben oder überspringen.</p>'
          + '<div style="margin:20px 0; padding:16px; background:#fdeaea; border-radius:12px; color:#bb0000;">'
          + '<strong>Existierender Eintrag:</strong><br>'
          + fmtDate(dup.datum) + ' · ' + num(dup.ue) + ' UE · ' + dup.thema
          + '</div>';
      } else {
        html += '<h2 class="step-q">Neuer Schulungstag</h2>'
          + '<p class="step-help">Dieser Eintrag ist neu und wird hinzugefügt.</p>';
      }

      html += '<div style="margin:20px 0; padding:16px; background:var(--brand-soft); border-radius:12px;">'
        + '<div style="font-size:14px; margin-bottom:8px;"><b>' + esc(kurs.name) + '</b></div>'
        + '<div style="font-size:13px; color:var(--muted);">' + fmtDate(data.datum) + ' · ' + num(data.ue) + ' UE · ' + euro(honorar) + '</div>'
        + '<div style="font-size:13px; margin-top:8px;">' + esc(data.themen) + '</div>'
        + (data.unterlagen ? '<div style="font-size:12px; color:var(--muted); margin-top:6px;">' + esc(data.unterlagen) + '</div>' : '')
        + '</div>'
        + '<div class="wizard-nav" style="margin-top:24px;">'
        + '<button class="btn secondary" type="button" id="importBackBtn">Zurück</button>'
        + '<button class="btn primary" type="button" id="importConfirmBtn">' + (dup ? 'Überschreiben' : 'Hinzufügen') + '</button>';
      if (dup) html += '<button class="btn secondary" type="button" id="importSkipBtn">Überspringen</button>';
      html += '</div>';

      host.innerHTML = html;
      document.getElementById('importBackBtn').addEventListener('click', renderImportScreen);
      document.getElementById('importConfirmBtn').addEventListener('click', onImportConfirm);
      if (dup) document.getElementById('importSkipBtn').addEventListener('click', () => goOverview());
    }

    function onImportConfirm() {
      const data = importedData;
      const dup = importDuplicate;
      const kurs = kursById(data.kursId);
      const at = nowIso();

      const tag = normalizeTag({
        id: dup ? dup.id : uid('tag'),
        datum: data.datum,
        von: data.von || '',
        bis: data.bis || '',
        ue: data.ue,
        thema: data.themen,
        material: data.unterlagen || '',
        bemerkung: '',
        status: 'gehalten',
        abgerechnet: false,
        quelle: 'quick-log-import',
        createdAt: dup ? dup.createdAt : at,
        createdBy: dup ? dup.createdBy : currentUser(),
        updatedAt: at,
        updatedBy: currentUser()
      });

      if (dup) {
        const idx = kurs.schulungstage.findIndex(t => t.id === dup.id);
        if (idx >= 0) kurs.schulungstage[idx] = tag;
        audit('kurs_schulungstag_imported_update', { kursId: kurs.id, datum: data.datum });
      } else {
        kurs.schulungstage.push(tag);
        kurs.schulungstage.sort((a, b) => String(a.datum).localeCompare(String(b.datum)));
        audit('kurs_schulungstag_imported_new', { kursId: kurs.id, datum: data.datum, ue: num(data.ue) });
      }
      kurs.updatedAt = at;
      kurs.updatedBy = currentUser();
      saveKurse();

      showSuccess(
        'Schulungstag importiert!',
        fmtDate(data.datum) + ' für „' + kurs.name + '" wurde gespeichert.',
        [
          { label: 'Weiteren Tag importieren', onClick: () => { importedData = null; importDuplicate = null; goImport(); } },
          { label: 'Zur Übersicht', onClick: () => { expandedKursId = kurs.id; goOverview(); } },
          { label: 'Zur Startseite', onClick: goHome }
        ]
      );
    }

    function goImport() {
      renderImportScreen();
      showScreen('screenImport');
    }

    document.getElementById('importBtn').addEventListener('click', goImport);

    if (!requireAccess()) return;
    loadTcMandanten();
    loadKurse();
    renderHome();
  </script>
</body>
</html>
