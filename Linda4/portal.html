<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mein Fall – Sozialrecht Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #003087; --accent: #0050c8; --cyan: #0ea5e9;
      --green: #16a34a; --amber: #d97706;
      --text: #111827; --muted: #6b7280; --border: #e5e7eb;
      --bg: #f3f4f6; --white: #ffffff;
    }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { background: linear-gradient(90deg, var(--blue), var(--accent), var(--cyan)); height: 4px; }
    header {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 18px 32px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-mark { width: 32px; height: 32px; background: var(--blue); display: flex; align-items: center; justify-content: center; }
    .logo-mark svg { width: 16px; height: 16px; fill: #fff; }
    .logo-name { font-size: 0.78rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--blue); }

    main { max-width: 720px; margin: 0 auto; padding: 40px 24px 72px; }

    /* Loading */
    .loading { text-align: center; padding: 80px 24px; }
    .loading-ring { width: 48px; height: 48px; border: 3px solid #e5e7eb; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--muted); font-size: 0.9rem; }

    /* Error */
    .error-box { background: #fef2f2; border: 1px solid #fca5a5; padding: 24px; text-align: center; border-radius: 2px; }
    .error-box h2 { color: #dc2626; margin-bottom: 8px; }
    .error-box p { color: #6b7280; font-size: 0.9rem; }

    /* Status badge */
    .status-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 14px; font-size: 0.76rem; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase; border-radius: 2px;
    }
    .status-badge.offen     { background: #fff7ed; border: 1px solid #fed7aa; color: var(--amber); }
    .status-badge.beantwortet { background: #f0fdf4; border: 1px solid #86efac; color: var(--green); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-badge.offen .status-dot { background: var(--amber); animation: pulse 2s infinite; }
    .status-badge.beantwortet .status-dot { background: var(--green); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

    /* Hero */
    .page-hero { margin-bottom: 28px; }
    .page-hero h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 6px; }
    .page-hero p { color: var(--muted); font-size: 0.88rem; }

    /* Card */
    .card { background: var(--white); border: 1px solid var(--border); margin-bottom: 16px; overflow: hidden; }
    .card-head { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: #fafafa; }
    .card-head-label { font-size: 0.7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .card-body { padding: 20px 24px; }

    .meta-grid { display: grid; grid-template-columns: 140px 1fr; gap: 10px; font-size: 0.88rem; }
    .meta-key { color: var(--muted); }
    .meta-val { color: var(--text); font-weight: 600; }

    .beschreibung-text { font-size: 0.92rem; line-height: 1.75; color: var(--text); white-space: pre-wrap; }

    .einschaetzung-box { background: #f0f9ff; border-left: 3px solid var(--cyan); padding: 14px 18px; font-size: 0.9rem; color: #1e3a8a; line-height: 1.75; }
    .einschaetzung-disclaimer { font-size: 0.74rem; color: var(--muted); margin-top: 10px; }

    .antwort-box { background: #f0fdf4; border-left: 3px solid var(--green); padding: 16px 20px; font-size: 0.92rem; color: #14532d; line-height: 1.8; white-space: pre-wrap; }
    .antwort-date { font-size: 0.75rem; color: var(--muted); margin-top: 10px; }

    /* Warte-Hinweis */
    .warte-box { display: flex; align-items: flex-start; gap: 14px; background: #fff7ed; border: 1px solid #fed7aa; padding: 16px 20px; font-size: 0.88rem; color: #92400e; line-height: 1.6; }
    .warte-icon { font-size: 1.2rem; flex-shrink: 0; }

    footer { background: var(--white); border-top: 1px solid var(--border); padding: 16px 32px; text-align: center; font-size: 0.74rem; color: var(--muted); }

    @media (max-width: 540px) { main { padding: 24px 16px 48px; } .card-head, .card-body { padding: 14px 16px; } }
  </style>
</head>
<body>
<div class="topbar"></div>
<header>
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg></div>
    <span class="logo-name">Sozialrecht · Mein Fall-Portal</span>
  </div>
</header>

<main>
  <div id="loading" class="loading">
    <div class="loading-ring"></div>
    <p>Fall wird geladen …</p>
  </div>
  <div id="error" class="error-box" style="display:none">
    <h2>Fall nicht gefunden</h2>
    <p>Der Link ist möglicherweise abgelaufen oder ungültig.</p>
  </div>
  <div id="content" style="display:none"></div>
</main>

<footer>Alle Angaben vertraulich · DSGVO-konform · pfk2026.oldenburg-knowledge.de</footer>

<script>
  const id = new URLSearchParams(location.search).get('id');

  if (!id) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  } else {
    fetch(`/api/portal?id=${encodeURIComponent(id)}`)
      .then(r => r.json())
      .then(d => {
        document.getElementById('loading').style.display = 'none';
        if (d.error) { document.getElementById('error').style.display = 'block'; return; }
        render(d);
      })
      .catch(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
      });
  }

  function fmt(iso) {
    return new Date(iso).toLocaleString('de-DE', { timeZone: 'Europe/Berlin', dateStyle: 'long', timeStyle: 'short' });
  }

  function render(d) {
    const content = document.getElementById('content');
    content.style.display = 'block';

    const offen = d.status !== 'beantwortet';

    content.innerHTML = `
      <div class="page-hero">
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px;">
          <h1>Dein Fall – ${d.thema}</h1>
          <span class="status-badge ${d.status}"><span class="status-dot"></span>${offen ? 'In Bearbeitung' : 'Beantwortet'}</span>
        </div>
        <p>Eingegangen am ${fmt(d.created)}</p>
      </div>

      <div class="card">
        <div class="card-head"><span class="card-head-label">Deine Angaben</span></div>
        <div class="card-body">
          <div class="meta-grid" style="margin-bottom:16px;">
            <span class="meta-key">Name</span><span class="meta-val">${d.vorname} ${d.nachname}</span>
            <span class="meta-key">Fachbereich</span><span class="meta-val">${d.fachbereich}</span>
            <span class="meta-key">Themenbereich</span><span class="meta-val">${d.thema}</span>
          </div>
          <p style="font-size:0.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Fallbeschreibung</p>
          <div class="beschreibung-text">${d.beschreibung}</div>
        </div>
      </div>

      ${d.einschaetzung ? `
      <div class="card">
        <div class="card-head"><span class="card-head-label">🤖 Linda4 – Erste Einschätzung</span></div>
        <div class="card-body">
          <div class="einschaetzung-box">${d.einschaetzung}</div>
          <p class="einschaetzung-disclaimer">Unverbindlich · Keine Rechtsberatung · Nur zur Orientierung</p>
        </div>
      </div>` : ''}

      <div class="card">
        <div class="card-head">
          <span class="card-head-label">Expertenantwort</span>
          <span class="status-badge ${d.status}" style="font-size:0.68rem;padding:4px 10px;">${offen ? 'Ausstehend' : 'Eingegangen'}</span>
        </div>
        <div class="card-body">
          ${d.antwort ? `
            <div class="antwort-box">${d.antwort}</div>
            <p class="antwort-date">Beantwortet am ${fmt(d.antwortDatum)}</p>
          ` : `
            <div class="warte-box">
              <span class="warte-icon">⏳</span>
              <div>
                <strong>Deine Anfrage wird bearbeitet.</strong><br/>
                Du erhältst eine E-Mail sobald die Antwort vorliegt – schau auch hier rein.
              </div>
            </div>
          `}
        </div>
      </div>`;
  }
</script>
</body>
</html>
