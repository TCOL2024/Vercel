<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Linda4 (fastgpt)</title>
    <style>
      :root {
        --bg: #080b14;
        --card: rgba(17, 22, 36, 0.7);
        --line: rgba(160, 180, 255, 0.22);
        --text: #ebf0ff;
        --muted: #a5b2d8;
        --accent: #73a5ff;
        --accent-2: #6af0d8;
        --ok: #97f5c6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        color: var(--text);
        background: radial-gradient(circle at 15% 15%, #152443 0%, var(--bg) 45%),
          radial-gradient(circle at 85% 10%, #0f3a4b 0%, transparent 35%), var(--bg);
        display: grid;
        place-items: center;
        padding: 16px;
      }
      .app {
        width: min(940px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 18px 60px rgba(3, 8, 22, 0.45);
        padding: 16px;
      }
      .top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
      h1 { font-size: clamp(1.1rem, 2vw, 1.35rem); margin:0; }
      .tag { color:var(--ok); border:1px solid rgba(151,245,198,.5); padding:4px 10px; border-radius:999px; font-size:.78rem; }
      .grid { margin-top:14px; display:grid; gap:12px; grid-template-columns:1fr; }
      .controls, .output { border:1px solid var(--line); border-radius:14px; padding:12px; background:rgba(7,11,23,.45); }
      label { display:block; font-size:.83rem; color:var(--muted); margin-bottom:6px; }
      textarea, select, input {
        width:100%; background:#0c1325; color:var(--text); border:1px solid #2b3b64; border-radius:10px; padding:11px 12px;
      }
      textarea { min-height:120px; resize:vertical; }
      .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
      .btns { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
      button {
        border:0; border-radius:11px; padding:10px 14px; font-weight:600; cursor:pointer;
        background:linear-gradient(120deg,var(--accent),var(--accent-2)); color:#041220;
      }
      button.secondary { background:#162242; color:var(--text); border:1px solid #2d4275; }
      pre {
        margin:0; white-space:pre-wrap; line-height:1.5; color:#f3f7ff;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      .hint { color:var(--muted); font-size:.82rem; margin-top:8px; }
      @media (max-width:640px){ .row{ grid-template-columns:1fr; } .app{ padding:12px; } }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="top">
        <h1>Linda4 (fastgpt)</h1>
        <span class="tag">DeepSeek Focus</span>
      </div>

      <section class="grid">
        <div class="controls">
          <label for="mode">Aufgabe</label>
          <select id="mode">
            <option value="exam">Prüfungsfragen erstellen</option>
            <option value="quiz">Quizfragen erstellen</option>
          </select>

          <div class="row" style="margin-top:10px;">
            <div>
              <label for="subject">Fach / Thema</label>
              <input id="subject" placeholder="z. B. Rechnungswesen" />
            </div>
            <div>
              <label for="count">Anzahl</label>
              <input id="count" type="number" min="1" max="30" value="8" />
            </div>
          </div>

          <label for="details" style="margin-top:10px;">Kontext / Lernziel</label>
          <textarea id="details" placeholder="Lernstand, Zielgruppe, Schwierigkeitsgrad, Formate ..."></textarea>

          <div class="btns">
            <button id="runBtn">Generieren</button>
            <button id="clearBtn" class="secondary" type="button">Zurücksetzen</button>
          </div>
          <p class="hint">Optimiert für Mobile. Eingaben werden lokal bereinigt, um schädliche Instruktionen zu reduzieren.</p>
        </div>

        <div class="output">
          <label>Ergebnis</label>
          <pre id="result">Bereit.</pre>
        </div>
      </section>
    </main>

    <script>
      const result = document.getElementById('result');
      const modeEl = document.getElementById('mode');
      const subjectEl = document.getElementById('subject');
      const countEl = document.getElementById('count');
      const detailsEl = document.getElementById('details');

      const sanitize = (txt) =>
        txt
          .replace(/```[\s\S]*?```/g, '[entfernt]')
          .replace(/(?:ignore|bypass|system prompt|developer message|tool call)/gi, '[blockiert]')
          .replace(/[<>]/g, '')
          .trim()
          .slice(0, 2600);

      document.getElementById('clearBtn').onclick = () => {
        subjectEl.value = '';
        detailsEl.value = '';
        countEl.value = 8;
        modeEl.value = 'exam';
        result.textContent = 'Bereit.';
      };

      document.getElementById('runBtn').onclick = async () => {
        const subject = sanitize(subjectEl.value);
        const details = sanitize(detailsEl.value);
        const count = Math.max(1, Math.min(30, Number(countEl.value) || 8));
        const mode = modeEl.value;

        if (!subject) {
          result.textContent = 'Bitte ein Fach oder Thema angeben.';
          return;
        }

        result.textContent = 'Erstelle Fragen…';

        const payload = {
          provider: 'deepseek',
          task: mode,
          subject,
          amount: count,
          context: details,
          useOpenAIVectorStoreIfAvailable: true
        };

        try {
          const res = await fetch('/api/deepseek', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!res.ok) {
            throw new Error('HTTP ' + res.status);
          }

          const data = await res.json();
          result.textContent = String(data?.output || data?.text || 'Keine Ausgabe erhalten.');
        } catch (err) {
          result.textContent = 'Fehler beim Laden. Bitte Vercel-Umgebungsvariablen und /api/deepseek prüfen.\n\nDetails: ' + err.message;
        }
      };
    </script>
  </body>
</html>
