<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Abrechnung - Rechnungsvorschläge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --shell: #354a5f;
      --brand: #0a6ed1;
      --brand-dark: #0854a0;
      --brand-soft: #ebf3fb;
      --bg: #f5f6f7;
      --panel: #ffffff;
      --line: #e3e6e9;
      --line-strong: #cfd6dc;
      --text: #32363a;
      --muted: #6a6d70;
      --ok: #107e3e;
      --ok-soft: #e9f5ee;
      --danger: #bb0000;
      --focus: rgba(10, 110, 209, 0.22);
      --shadow: 0 6px 18px rgba(33, 40, 48, 0.08);
      --shadow-lift: 0 14px 30px rgba(20, 50, 90, 0.16);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: "72", "Source Sans 3", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }
    .shellbar {
      background: var(--shell);
      color: #fff;
      padding: 0 22px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(15, 25, 35, 0.25);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .shellbar .shell-left { display: flex; align-items: center; gap: 12px; }
    .shell-logo {
      width: 34px; height: 34px; border-radius: 9px;
      background: linear-gradient(145deg, #0a6ed1, #0854a0);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; letter-spacing: 0.4px;
      border: 1px solid rgba(255,255,255,0.3);
      flex: none;
    }
    .shell-title { font-size: 16px; font-weight: 600; }
    .shell-sub { font-size: 12px; color: rgba(255,255,255,0.72); }
    .shell-right { display: flex; align-items: center; gap: 8px; }
    .shell-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff; border-radius: 8px; padding: 7px 13px;
      font: inherit; font-size: 13.5px; font-weight: 600;
      text-decoration: none; cursor: pointer;
    }
    .shell-btn:hover { background: rgba(255,255,255,0.2); }
    .shell-user {
      width: 34px; height: 34px; border-radius: 50%;
      background: #5b768e;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; flex: none;
      border: 1px solid rgba(255,255,255,0.35);
    }
    .stage { max-width: 1060px; margin: 0 auto; padding: 28px 22px 60px; }
    .screen { display: none; animation: fadeUp 0.28s ease; }
    .screen.active { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero { margin: 8px 0 26px; }
    .hero h1 { margin: 0 0 6px; font-size: 30px; font-weight: 700; }
    .hero p { margin: 0; font-size: 16.5px; color: var(--muted); }
    .stat-strip { display: flex; gap: 10px; flex-wrap: wrap; margin: 0 0 26px; }
    .stat-chip {
      background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
      padding: 10px 16px; box-shadow: var(--shadow);
      display: flex; align-items: baseline; gap: 8px;
    }
    .stat-chip strong { font-size: 20px; color: var(--brand-dark); }
    .stat-chip span { font-size: 13px; color: var(--muted); font-weight: 600; }
    .action-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 16px;
    }
    .action-card {
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 24px 22px; cursor: pointer; text-align: left;
      box-shadow: var(--shadow); font: inherit; color: var(--text);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      display: flex; flex-direction: column; gap: 10px;
    }
    .action-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); border-color: var(--brand); }
    .action-icon {
      width: 48px; height: 48px; border-radius: 13px;
      background: var(--brand-soft); color: var(--brand-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 23px;
    }
    .action-card h3 { margin: 2px 0 0; font-size: 17.5px; }
    .action-card p { margin: 0; font-size: 14px; color: var(--muted); line-height: 1.45; }
    .action-card .go { margin-top: auto; color: var(--brand); font-weight: 700; font-size: 14px; }
    .group-cards { display: grid; gap: 14px; }
    .group-card {
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 20px 24px;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }
    .group-card:hover { border-color: var(--brand); box-shadow: var(--shadow-lift); }
    .group-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
    .group-header h3 { margin: 0 0 3px; font-size: 18.5px; }
    .group-meta { font-size: 13.5px; color: var(--muted); }
    .group-meta b { color: #44515e; }
    .summary-list { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
    .summary-row {
      display: flex; justify-content: space-between; align-items: center; gap: 14px;
      padding: 12px 16px; border-bottom: 1px solid var(--line); background: #fff; font-size: 14px;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-row .date { color: var(--muted); font-weight: 600; min-width: 100px; }
    .summary-row .ue { text-align: center; min-width: 40px; }
    .summary-row .satz { text-align: right; min-width: 70px; font-size: 13px; color: var(--muted); }
    .summary-row .amount { text-align: right; min-width: 90px; font-weight: 700; color: var(--brand-dark); }
    .group-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--line); }
    .group-total { font-size: 18px; font-weight: 700; color: var(--brand-dark); }
    .btn {
      font: inherit; font-weight: 700; cursor: pointer; border-radius: 999px;
      padding: 14px 30px; font-size: 16px; border: 2px solid transparent;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn.primary {
      background: var(--brand); color: #fff;
      box-shadow: 0 8px 18px rgba(10, 110, 209, 0.3);
    }
    .btn.primary:hover { background: var(--brand-dark); }
    .btn.secondary { background: #fff; color: var(--brand-dark); border-color: var(--line-strong); }
    .btn.secondary:hover { border-color: var(--brand); }
    .btn.small { padding: 9px 18px; font-size: 14px; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .dialog-card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 20px;
      box-shadow: var(--shadow); padding: 38px 44px 32px;
      max-width: 720px; margin: 0 auto;
    }
    @media (max-width: 640px) { .dialog-card { padding: 26px 20px; } }
    .step-kicker { font-size: 13px; font-weight: 700; color: var(--brand); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .step-q { margin: 0 0 6px; font-size: 25px; font-weight: 700; line-height: 1.25; }
    .step-help { margin: 0 0 24px; font-size: 15px; color: var(--muted); line-height: 1.5; }
    .success-card { text-align: center; padding: 54px 30px 44px; }
    .success-check {
      width: 84px; height: 84px; margin: 0 auto 20px; border-radius: 50%;
      background: var(--ok-soft); color: var(--ok);
      display: flex; align-items: center; justify-content: center;
    }
    .success-check svg { width: 44px; height: 44px; }
    .success-card h2 { margin: 0 0 8px; font-size: 26px; }
    .success-card p { margin: 0 0 28px; color: var(--muted); font-size: 16px; }
    .success-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .empty-state {
      text-align: center; padding: 50px 20px; color: var(--muted);
      background: var(--panel); border: 1px dashed var(--line-strong); border-radius: var(--radius);
    }
    .empty-state .big { font-size: 38px; margin-bottom: 8px; }
    h2 { margin: 0 0 10px; font-size: 24px; }
    .wizard-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 8px; }
    .wizard-head .crumb { font-size: 13.5px; color: var(--muted); font-weight: 600; }
    .link-btn {
      background: none; border: none; color: var(--brand); font: inherit;
      font-size: 14px; font-weight: 700; cursor: pointer; padding: 6px 2px;
    }
    .link-btn:hover { text-decoration: underline; }
    .progress-track {
      height: 6px; border-radius: 99px; background: #e2e8ee; overflow: hidden; margin: 6px 0 30px;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--brand), #3b94e8);
      transition: width 0.3s ease;
    }
    .step-error { color: var(--danger); font-size: 14px; font-weight: 700; margin-top: 14px; min-height: 18px; }
    .wizard-nav { display: flex; justify-content: space-between; gap: 12px; margin-top: 32px; }
  </style>
</head>
<body>
  <header class="shellbar">
    <div class="shell-left">
      <div class="shell-logo">AB</div>
      <div>
        <div class="shell-title">Abrechnung</div>
        <div class="shell-sub">Rechnungsvorschläge &middot; noormann t&amp;c</div>
      </div>
    </div>
    <div class="shell-right">
      <button class="shell-btn" type="button" id="navHomeBtn">Start</button>
      <a class="shell-btn" href="Dashboard.html">Dashboard</a>
      <div class="shell-user" id="userInitials">?</div>
    </div>
  </header>

  <main class="stage">

    <!-- HOME -->
    <section class="screen active" id="screenHome">
      <div class="hero">
        <h1 id="greeting">Guten Tag!</h1>
        <p>Erstellen Sie Rechnungsvorschläge aus Ihren gehaltenen Schulungstagen.</p>
      </div>
      <div class="stat-strip" id="statStrip"></div>
      <div id="homeContent"></div>
    </section>

    <!-- CONFIRM -->
    <section class="screen" id="screenConfirm">
      <div class="wizard-head">
        <span class="crumb">Rechnungsvorschlag erstellen</span>
        <button class="link-btn" type="button" id="cancelConfirm">Abbrechen</button>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:50%;"></div></div>
      <div class="dialog-card" id="confirmHost"></div>
    </section>

    <!-- SUCCESS -->
    <section class="screen" id="screenSuccess">
      <div class="dialog-card success-card">
        <div class="success-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h2 id="successTitle">Rechnungsvorschlag erstellt!</h2>
        <p id="successText">Ihre Rechnungsdaten wurden gespeichert.</p>
        <div class="success-actions" id="successActions"></div>
      </div>
    </section>

  </main>

  <script src="shared_storage_client.js"></script>
  <script src="assets/mandanten_store.js"></script>
  <script>
    const KURS_STORAGE_KEY = 'tc_kurse_v1';
    const INVOICE_STORAGE_KEY = 'rechnungsbuchungen_v1';
    const SESSION_KEY = 'rk_session_v1';

    let kurse = [];
    let invoices = [];
    let currentSession = null;
    let confirmGroup = null;

    function storageRead(key, fallback) {
      let appRaw = null, localRaw = null;
      try { appRaw = window.appStorage && window.appStorage.getItem(key); } catch (_) {}
      try { localRaw = window.localStorage.getItem(key); } catch (_) {}
      const parse = (raw) => { try { const v = JSON.parse(raw); return v == null ? null : v; } catch (_) { return null; } };
      const a = appRaw != null ? parse(appRaw) : null;
      const l = localRaw != null ? parse(localRaw) : null;
      if (Array.isArray(a) && Array.isArray(l)) return l.length > a.length ? l : a;
      return a != null ? a : (l != null ? l : fallback);
    }
    function storageWrite(key, value) {
      const json = JSON.stringify(value);
      try { window.appStorage && window.appStorage.setItem(key, json); } catch (_) {}
      try { window.localStorage.setItem(key, json); } catch (_) {}
    }
    function nowIso() { return new Date().toISOString(); }
    function uid(prefix) { return prefix + '-' + Date.now() + '-' + Math.floor(Math.random() * 1000000); }
    function esc(v) { return String(v == null ? '' : v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function fmtDate(iso) { if (!iso || !/^\d{4}-\d{2}-\d{2}/.test(iso)) return iso || '-'; const [y,m,d] = iso.slice(0,10).split('-'); return d + '.' + m + '.' + y; }
    function num(v) { const n = Number(v); return Number.isFinite(n) ? n : 0; }
    function euro(v) { return num(v).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €'; }

    function requireAccess() {
      const raw = storageRead(SESSION_KEY, null);
      const session = raw && typeof raw === 'object' && raw.username ? raw : null;
      if (!session) {
        window.location.href = 'Benutzerverwaltung.html?next=Abrechnung_Modul.html';
        return false;
      }
      currentSession = session;
      const initials = String(session.username || '?').slice(0, 2).toUpperCase();
      document.getElementById('userInitials').textContent = initials;
      const h = new Date().getHours();
      const gruss = h < 11 ? 'Guten Morgen' : (h < 18 ? 'Guten Tag' : 'Guten Abend');
      document.getElementById('greeting').textContent = gruss + ', ' + session.username + '!';
      return true;
    }
    function currentUser() { return currentSession ? String(currentSession.username) : 'unbekannt'; }

    function anbieterLabel(anbieterId) {
      if (!anbieterId) return '-';
      const m = window.MandantenStore ? MandantenStore.findMandantById(anbieterId) : null;
      return m ? (MandantenStore.displayName(m) || anbieterId) : anbieterId;
    }

    function loadKurse() {
      const list = storageRead(KURS_STORAGE_KEY, []);
      kurse = Array.isArray(list) ? list : [];
    }
    function loadInvoices() {
      const list = storageRead(INVOICE_STORAGE_KEY, []);
      invoices = Array.isArray(list) ? list : [];
    }
    function saveInvoices() { storageWrite(INVOICE_STORAGE_KEY, invoices); }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function collectOpenDays() {
      const grouped = {};
      kurse.forEach(k => {
        k.schulungstage.forEach(t => {
          if (t.status !== 'gehalten' || t.abgerechnet) return;
          const key = k.anbieterId + '||' + k.id;
          if (!grouped[key]) {
            grouped[key] = {
              anbieterId: k.anbieterId,
              anbieterLabel: anbieterLabel(k.anbieterId),
              kursId: k.id,
              kursName: k.name,
              kursIdNr: k.kursId,
              honorarProUE: num(k.honorarProUE),
              tage: []
            };
          }
          grouped[key].tage.push({
            id: t.id,
            datum: t.datum,
            ue: num(t.ue),
            thema: t.thema,
            status: t.status
          });
        });
      });
      return Object.values(grouped);
    }

    function renderHome() {
      const groups = collectOpenDays();
      const totalTage = groups.reduce((s, g) => s + g.tage.length, 0);
      const totalUE = groups.reduce((s, g) => s + g.tage.reduce((ss, t) => ss + num(t.ue), 0), 0);
      const totalWert = groups.reduce((s, g) => s + (g.tage.reduce((ss, t) => ss + num(t.ue), 0) * num(g.honorarProUE)), 0);

      document.getElementById('statStrip').innerHTML = ''
        + '<div class="stat-chip"><strong>' + totalTage + '</strong><span>offene Schulungstage</span></div>'
        + '<div class="stat-chip"><strong>' + totalUE + '</strong><span>offene UE</span></div>'
        + '<div class="stat-chip"><strong>' + euro(totalWert) + '</strong><span>zu rechnender Wert</span></div>';

      const host = document.getElementById('homeContent');
      if (!groups.length) {
        host.innerHTML = '<div class="empty-state"><div class="big">✅</div>Keine offenen Schulungstage vorhanden. Alle gehaltenen Unterrichtstage sind bereits abgerechnet.</div>';
        return;
      }

      host.innerHTML = '<div class="group-cards">' + groups.map(g => {
        const gUE = g.tage.reduce((s, t) => s + num(t.ue), 0);
        const gWert = gUE * num(g.honorarProUE);
        return '<div class="group-card">'
          + '<div class="group-header">'
          + '<div><h3>' + esc(g.kursName) + '</h3>'
          + '<div class="group-meta"><b>' + esc(g.anbieterLabel) + '</b>' + (g.kursIdNr ? ' · ID: ' + esc(g.kursIdNr) : '') + '</div>'
          + '</div>'
          + '<div style="text-align:right;"><div style="font-size:18px; font-weight:700; color:var(--brand-dark);">' + euro(gWert) + '</div>'
          + '<div style="font-size:13px; color:var(--muted);">' + gUE + ' UE</div></div>'
          + '</div>'
          + '<div class="summary-list">'
          + '<div style="padding:12px 16px; background:#f9fafb; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px;">'
          + '<span>Datum</span><span style="min-width:40px; text-align:center;">UE</span><span style="min-width:70px; text-align:right;">Satz</span><span style="min-width:90px; text-align:right;">Wert</span></div>'
          + g.tage.map(t => {
            const tWert = num(t.ue) * num(g.honorarProUE);
            return '<div class="summary-row">'
              + '<span class="date">' + fmtDate(t.datum) + '</span>'
              + '<span class="ue"><b>' + num(t.ue) + '</b></span>'
              + '<span class="satz">' + euro(g.honorarProUE) + '</span>'
              + '<span class="amount">' + euro(tWert) + '</span>'
              + '</div>';
          }).join('')
          + '</div>'
          + '<div class="group-footer">'
          + '<div class="group-total">' + euro(gWert) + ' (gesamt)</div>'
          + '<button class="btn primary small" type="button" data-confirm-group=\'' + JSON.stringify(g).replace(/'/g, '&quot;') + '\'>Rechnungsvorschlag erstellen</button>'
          + '</div>'
          + '</div>';
      }).join('') + '</div>';

      host.querySelectorAll('[data-confirm-group]').forEach(btn => {
        btn.addEventListener('click', () => {
          const groupJson = btn.getAttribute('data-confirm-group').replace(/&quot;/g, '"');
          confirmGroup = JSON.parse(groupJson);
          showConfirm();
        });
      });
    }

    function showConfirm() {
      if (!confirmGroup) return;
      const g = confirmGroup;
      const gUE = g.tage.reduce((s, t) => s + num(t.ue), 0);
      const gWert = gUE * num(g.honorarProUE);

      const liste = '<div class="summary-list">'
        + '<div style="padding:12px 16px; background:#f9fafb; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px;">'
        + '<span>Datum</span><span style="min-width:40px; text-align:center;">UE</span><span style="min-width:70px; text-align:right;">Satz</span><span style="min-width:90px; text-align:right;">Wert</span></div>'
        + g.tage.map(t => {
          const tWert = num(t.ue) * num(g.honorarProUE);
          return '<div class="summary-row">'
            + '<span class="date">' + fmtDate(t.datum) + '</span>'
            + '<span class="ue"><b>' + num(t.ue) + '</b></span>'
            + '<span class="satz">' + euro(g.honorarProUE) + '</span>'
            + '<span class="amount">' + euro(tWert) + '</span>'
            + '</div>';
        }).join('')
        + '</div>';

      const html = '<div class="step-kicker">Bestätigung</div>'
        + '<h2 class="step-q">Rechnungsvorschlag erstellen?</h2>'
        + '<p class="step-help">Diese Schulungstage werden in einen neuen Rechnungsvorschlag übernommen und auf „abgerechnet" gesetzt.</p>'
        + '<div style="margin:20px 0 16px; padding:16px; background:var(--brand-soft); border-radius:12px;">'
        + '<div style="font-size:14px; color:var(--text); margin-bottom:6px;"><b>' + esc(g.kursName) + '</b> · ' + esc(g.anbieterLabel) + '</div>'
        + '<div style="font-size:13px; color:var(--muted);">' + g.tage.length + ' Schulungstage · ' + gUE + ' UE</div>'
        + '</div>'
        + liste
        + '<div style="margin-top:20px; padding:16px; background:#f0f4f8; border-radius:12px; display:flex; justify-content:space-between; align-items:center;">'
        + '<span style="font-size:14px; font-weight:700;">Rechnungsbetrag:</span>'
        + '<span style="font-size:22px; font-weight:700; color:var(--brand-dark);">' + euro(gWert) + '</span>'
        + '</div>'
        + '<div style="margin-top:20px; padding:12px; background:#ebf3fb; border-radius:10px; font-size:14px; color:#0854a0;">'
        + '💡 Die Schulungstage werden als abgerechnet markiert und können nicht mehr doppelt erfasst werden.'
        + '</div>'
        + '<div class="step-error" id="confirmError"></div>'
        + '<div class="wizard-nav" style="margin-top:24px;">'
        + '<button class="btn secondary" type="button" id="cancelBtn">Abbrechen</button>'
        + '<button class="btn primary" type="button" id="confirmBtn">Rechnungsvorschlag erstellen</button>'
        + '</div>';

      document.getElementById('confirmHost').innerHTML = html;
      document.getElementById('cancelBtn').addEventListener('click', () => showScreen('screenHome'));
      document.getElementById('confirmBtn').addEventListener('click', onConfirm);
      showScreen('screenConfirm');
    }

    function onConfirm() {
      if (!confirmGroup) return;
      const g = confirmGroup;
      const gUE = g.tage.reduce((s, t) => s + num(t.ue), 0);
      const gWert = gUE * num(g.honorarProUE);

      const einzelposten = g.tage.map(t => ({
        tagId: t.id,
        datum: t.datum,
        ue: num(t.ue),
        satz: num(g.honorarProUE),
        betrag: num(t.ue) * num(g.honorarProUE)
      }));

      const invoice = {
        id: uid('inv'),
        createdAt: nowIso(),
        createdBy: currentUser(),
        anbieterId: g.anbieterId,
        anbieterLabel: g.anbieterLabel,
        kursId: g.kursId,
        kursName: g.kursName,
        kursIdNr: g.kursIdNr,
        summe: gWert,
        ue: gUE,
        einzelposten: einzelposten,
        status: 'entwurf'
      };

      invoices.push(invoice);
      saveInvoices();

      g.tage.forEach(t => {
        const kurs = kurse.find(k => k.id === g.kursId);
        if (kurs) {
          const tag = kurs.schulungstage.find(tt => tt.id === t.id);
          if (tag) {
            tag.abgerechnet = true;
            tag.updatedAt = nowIso();
            tag.updatedBy = currentUser();
          }
        }
      });
      storageWrite(KURS_STORAGE_KEY, kurse);

      try {
        if (window.MandantenStore && MandantenStore.appendCentralAudit) {
          MandantenStore.appendCentralAudit('abrechnung_created', { id: invoice.id, kurs: g.kursName, summe: gWert, ue: gUE }, currentUser(), nowIso());
        }
      } catch (_) {}

      showSuccess(
        'Rechnungsvorschlag erstellt!',
        euro(gWert) + ' · ' + gUE + ' UE für „' + g.kursName + '" erfolgreich erfasst.',
        [
          { label: 'Nächsten Vorschlag erstellen', onClick: () => { confirmGroup = null; showScreen('screenHome'); renderHome(); } },
          { label: 'Zur Startseite', onClick: () => { confirmGroup = null; showScreen('screenHome'); } }
        ]
      );
    }

    function showSuccess(title, text, actions) {
      document.getElementById('successTitle').textContent = title;
      document.getElementById('successText').textContent = text;
      const host = document.getElementById('successActions');
      host.innerHTML = '';
      actions.forEach((a, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn ' + (i === 0 ? 'primary' : 'secondary');
        btn.textContent = a.label;
        btn.addEventListener('click', a.onClick);
        host.appendChild(btn);
      });
      showScreen('screenSuccess');
    }

    document.getElementById('navHomeBtn').addEventListener('click', () => showScreen('screenHome'));
    document.getElementById('cancelConfirm').addEventListener('click', () => showScreen('screenHome'));

    if (!requireAccess()) return;
    loadKurse();
    loadInvoices();
    renderHome();
  </script>
</body>
</html>
